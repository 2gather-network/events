function parseSheetDate(val) {
  if (!val) return "";
  const s = String(val);
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  if (s.includes("T")) return s.split("T")[0];
  return s;
}

function parseSheetTime(val) {
  if (!val) return "";
  const s = String(val);
  if (/^\d{2}:\d{2}$/.test(s)) return s;
  if (s.includes("T")) { const t = s.split("T")[1]; return t.substring(0,5); }
  return s;
}

function sheetToEv(row) {

  const isRecurring = RECURRING_IDS.includes(String(row.id)) || RECURRING_TITLES.some(t => titleKey.includes(t));
  return {
    id: String(row.id||""), title: row.title||"",
    categories: row.categories ? String(row.categories).split(",").filter(Boolean) : [],
    date: parseSheetDate(row.date), time: parseSheetTime(row.startTime), endtime: parseSheetTime(row.endTime),

  };

function jsonp(params) {
  return new Promise((resolve, reject) => {
    const cbName = "cb_" + Date.now() + "_" + Math.random().toString(36).slice(2);
    let settled = false;
    const done = (fn) => { if (settled) return; settled = true; delete window[cbName]; try { script.remove(); } catch(e) {} fn(); };
    const timeout = setTimeout(() => done(() => reject(new Error("JSONP timeout"))), 20000);
    window[cbName] = (data) => { clearTimeout(timeout); done(() => resolve(data)); };
    const qs = Object.entries(params)
      .map(([k,v]) => `${encodeURIComponent(k)}=${encodeURIComponent(typeof v==="object"?JSON.stringify(v):v)}`).join("&");
    const script = document.createElement("script");
    script.src = GS_URL + "?" + qs + "&callback=" + cbName;
    script.onerror = () => {};
    document.head.appendChild(script);
  });
}

(function applyRecurringOverrides() {

})();

        bar.style.cssText = "display:block;background:#FFF8E7;border:1.5px solid #F0B429;border-radius:10px;padding:12px 16px;font-size:13px;color:#7B5800;text-align:center;margin-bottom:14px;";
        bar.innerHTML = "⚠️ Having trouble loading events? Try disabling your browser\'s ad blocker or shields for this page.";
      }
    }
  } finally {
    showLoading(false);
    populateHostFilter();
    renderEvents();
    checkEventLink();
  }
}

function populateHostFilter() {
  const sel = document.getElementById("host-filter");
  if (!sel) return;
  const current = sel.value;
  const hosts = [...new Set(events.map(e => e.host).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">All hosts</option>';
  hosts.forEach(h => {
    const opt = document.createElement("option");
    opt.value = h; opt.textContent = h;
    if (h === current) opt.selected = true;
    sel.appendChild(opt);
  });
}

function showLoading(on) {

function renderEvents() {
  const grid = document.getElementById("event-grid");
  const q    = document.getElementById("search-input").value.toLowerCase();
  const now  = Date.now();

  const publicRec = getPublicRecurring(2);
  const allEvents = [...events, ...publicRec];

  let list = allEvents.filter(e => {
    let cats = Array.isArray(e.categories) ? e.categories : [e.category].filter(Boolean);
    cats = cats.map(c => {
      const byId = CATEGORIES.find(cat => cat.id === c); if (byId) return c;
      const byLabel = CATEGORIES.find(cat => cat.label.toLowerCase() === c.toLowerCase()); if (byLabel) return byLabel.id;
      const partial = CATEGORIES.find(cat => cat.label.toLowerCase().includes(c.toLowerCase()) || c.toLowerCase().includes(cat.id.toLowerCase()));
      return partial ? partial.id : c;
    });
    const matchCat  = activeFilter === "all" || cats.includes(activeFilter);
    const matchQ    = !q || e.title.toLowerCase().includes(q) || (e.description||"").toLowerCase().includes(q) || (e.location||"").toLowerCase().includes(q) || (e.host||"").toLowerCase().includes(q);
    const evEndMs   = e.endtime ? new Date(e.date + "T" + e.endtime).getTime() : new Date(e.date + "T" + (e.time||"00:00")).getTime() + 60*60*1000;
    const evStartMs = new Date(e.date + "T" + (e.time||"00:00")).getTime();
    const isPast    = evEndMs < now;
    const matchTab  = activeTab === "past" ? isPast : !isPast;
    const MS_WEEK = 7*24*60*60*1000, MS_MONTH = 30*24*60*60*1000, MS_QUARTER = 91*24*60*60*1000;
    let matchDate = true;
    if (activeDateFilter === "week")           matchDate = evStartMs >= now && evStartMs <= now + MS_WEEK;
    else if (activeDateFilter === "month")     matchDate = evStartMs >= now && evStartMs <= now + MS_MONTH;
    else if (activeDateFilter === "past-week") matchDate = evEndMs >= now - MS_WEEK && evEndMs < now;
    else if (activeDateFilter === "past-month") matchDate = evEndMs >= now - MS_MONTH && evEndMs < now;
    else if (activeDateFilter === "past-quarter") matchDate = evEndMs >= now - MS_QUARTER && evEndMs < now;
    const activeHost = document.getElementById("host-filter")?.value || "";
    if (isPast && evEndMs < now - MS_QUARTER && !activeHost) matchDate = false;
    const isVirtual  = e.format === "virtual" || e.format === "both" || !e.format;
    const isInPerson = e.format === "inperson" || e.format === "both" || !e.format;
    const matchMode  = q ? true : activeMode === "all" ? true : activeMode === "virtual" ? isVirtual : isInPerson;
    let matchLocation = true;
    if (activeMode === "inperson") {
      const state = document.getElementById("filter-state")?.value || "";
      const loc   = (e.location||"").toLowerCase();
      if (state) {
        const stateAbbr = (US_STATES_ABBR && US_STATES_ABBR[state]) || "";
        matchLocation = loc.includes(state.toLowerCase()) || (stateAbbr && new RegExp("\\b" + stateAbbr + "\\b","i").test(e.location||""));
      }
    }
    const matchHost  = !activeHost || (e.host||"").toLowerCase() === activeHost.toLowerCase();
    const effectiveMatchTab = activeHost ? true : matchTab;
    return matchCat && matchQ && effectiveMatchTab && matchMode && matchLocation && matchHost && matchDate;
  });

  list.sort((a, b) => {
    const da = new Date(a.date+"T"+(a.time||"00:00")).getTime();
    const db = new Date(b.date+"T"+(b.time||"00:00")).getTime();
    return activeTab === "past" ? db - da : da - db;
  });

      const partial = CATEGORIES.find(cat => cat.label.toLowerCase().includes(c.toLowerCase()) || c.toLowerCase().includes(cat.id.toLowerCase()));

    const card = document.createElement("div");

    const isPastCard = evEndMsCard < Date.now();

          ${ev.format === "virtual" || ev.format === "both" ? `<div class="event-meta-item"><span>💻</span>${ev.meetinglink ? `<a href="${esc(ev.meetinglink)}" target="_blank" rel="noopener" style="color:var(--primary);text-decoration:none;font-weight:700;">Join virtual meeting</a>` : (roomObj?.url ? `<a href="${esc(roomObj.url)}" target="_blank" rel="noopener" style="color:var(--primary);text-decoration:none;font-weight:700;">${esc(ev.room)}</a>` : "Virtual")}</div>` : ""}
          ${ev.format === "inperson" || ev.format === "both" ? `<div class="event-meta-item"><span>📍</span>${ev.location ? `<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(ev.location)}" target="_blank" rel="noopener" style="color:var(--primary);text-decoration:none;">${esc(ev.location)}</a>` : "In-person"}</div>` : ""}

          ${ev.contactEmail && ev.showLinks && ev.showLinks.includes("contact") ? `<div class="event-meta-item"><span>✉️</span><a href="mailto:${esc(ev.contactEmail)}" style="color:var(--primary);text-decoration:none;">${esc(ev.contactEmail)}</a></div>` : ""}
          ${ev.contactPhone && ev.showLinks && ev.showLinks.includes("contact") ? `<div class="event-meta-item"><span>📞</span>${esc(ev.contactPhone)}</div>` : ""}
          ${ev.exchangeType ? (() => { const typeMap = {money:"💰 Payment required",feedback:"💬 Feedback",testimonial:"⭐ Testimonial",time:"⏱ Equal time trade",free:"🎁 Free",share:"👥 Pass this along",noask:"🔗 No ask",other:"✏️ " + (ev.otherExchange || "Other")}; const labels = ev.exchangeType.split(",").filter(Boolean).map(t => typeMap[t] || t).join(" · "); return `<div class="event-meta-item" style="padding-left:0;flex-wrap:wrap;align-items:baseline;"><span style="color:var(--dark);margin-right:4px;white-space:nowrap;">Contributions welcomed:</span><span>${labels}</span></div>`; })() : ""}
        </div>

        </div>

    grid.appendChild(card);
  });
}


function shareEvent(id) {
  const allEv = [...(typeof events !== "undefined" ? events : []), ...(typeof getAllRecurring === "function" ? getAllRecurring(2) : [])];
  const ev = allEv.find(e => e.id === id);
  if (!ev) return;
  const url = window.location.origin + window.location.pathname + "?event=" + encodeURIComponent(id);
  const data = { title: ev.title, text: (ev.description || "").slice(0, 100) || ev.title, url };
  if (navigator.share) {
    navigator.share(data).catch(() => {});
  } else {
    navigator.clipboard.writeText(url).then(() => showToast("Link copied!")).catch(() => {
      prompt("Copy this link:", url);
    });
  }
}

function openEventById(id) {
  const allEv = [...(typeof events !== "undefined" ? events : []), ...(typeof getAllRecurring === "function" ? getAllRecurring(2) : [])];
  const ev = allEv.find(e => e.id === id);
  if (!ev) return;
  const card = document.querySelector('[data-event-id="' + id + '"]');
  if (!card) return;
  card.scrollIntoView({ behavior: "smooth", block: "center" });
  card.style.transition = "box-shadow 0.3s";
  card.style.boxShadow = "0 0 0 3px var(--primary)";

  const descEl = document.getElementById("desc-" + id);
  if (descEl && (ev.description || "").length > 200 && descEl.dataset.expanded !== "true") {
    toggleDesc(id);
  }
}

function toggleDesc(id) {
  const allEv = [...events, ...getAllRecurring(2)];
  const ev = allEv.find(e => e.id === id);
  if (!ev || (ev.description||"").length <= 200) return;
  const el = document.getElementById("desc-"+id);
  if (!el) return;
  const isExpanded = el.dataset.expanded === "true";
    const imgWrap = document.getElementById("img-wrap-" + id);
  if (isExpanded) {
    el.innerHTML = escNl(trunc(ev.description,200)) + `<span id="desc-more-${id}" style="color:var(--primary);font-size:13px;"> Read more</span>`;
    el.dataset.expanded = "false";
  } else {
        if (imgWrap) { const img = imgWrap.querySelector("img"); if(img) img.style.height = "130px"; }
  el.innerHTML = escNl(ev.description) + `<span id="desc-more-${id}    if (imgWrap) { const img = imgWrap.querySelector("img"); if(img) img.style.height = "220px"; }
  }" style="color:var(--primary);font-size:13px;"> Show less</span>`;
    el.dataset.expanded = "true";
  }
}

function addToCalendar(id) {
  const allEv = [...events, ...getAllRecurring(2)];
  const ev = allEv.find(e => e.id === id);
  if (!ev || !ev.date) return;
  function toCalDT(date, time) { const t = time||"00:00"; return date.replace(/-/g,"")+  "T"+t.replace(":","")+"00"; }
  const start = toCalDT(ev.date, ev.time);
  const end   = toCalDT(ev.date, ev.endtime||ev.time);
  const roomObj = ROOMS.find(r => r.name === ev.room);
  const location = ev.format === "virtual" ? (roomObj ? roomObj.url : "Virtual") : (ev.location||"");
  const details = [ev.description||"", roomObj ? "Room: "+roomObj.url : "", ev.cooplink ? "Cooperative link: "+ev.cooplink : "", "\nHosted by "+ev.host, ev.contactEmail ? "Email: "+ev.contactEmail : "", ev.contactPhone ? "Phone: "+ev.contactPhone : ""].filter(Boolean).join("\n\n");
  const RRULE_MAP = { "kickoff-001":"RRULE:FREQ=WEEKLY;BYDAY=MO", "onboarding-001":"RRULE:FREQ=WEEKLY;BYDAY=MO", "ikigai-001":"RRULE:FREQ=WEEKLY;BYDAY=TU", "monday kickoff":"RRULE:FREQ=WEEKLY;BYDAY=MO", "daybalancer onboarding":"RRULE:FREQ=WEEKLY;BYDAY=MO", "ikigai tuesdays":"RRULE:FREQ=WEEKLY;BYDAY=TU" };
  const titleKey = (ev.title||"").toLowerCase().trim();
  const rrule = RRULE_MAP[id] || Object.entries(RRULE_MAP).find(([k]) => titleKey.includes(k))?.[1];
  const params = new URLSearchParams({ text:ev.title, dates:start+"/"+end, details, location });
  if (ev.recurFreq === "weekly") {
    const day = ["SU","MO","TU","WE","TH","FR","SA"][new Date(ev.date+"T12:00").getDay()];
    params.append("recur", "RRULE:FREQ=WEEKLY;BYDAY="+day);
  } else if (ev.recurFreq === "monthly") {
    params.append("recur", "RRULE:FREQ=MONTHLY");
  } else if (ev.recurring && rrule) {
    params.append("recur", rrule);
  }
  window.open("https://calendar.google.com/calendar/r/eventedit?"+params.toString(), "_blank");
}

function checkEventLink() {
  const id = new URLSearchParams(window.location.search).get("event");
  if (!id) return;
  const card = document.querySelector(`[data-event-id="${id}"]`);
  if (!card) return;
  card.scrollIntoView({ behavior:"smooth", block:"center" });
  card.style.outline = "3px solid var(--primary)";
  card.style.boxShadow = "0 0 0 4px rgba(27,104,150,0.15)";
  setTimeout(() => { card.style.outline = ""; card.style.boxShadow = ""; }, 3000);
}

function setTab(tab) {
  setDateFilter(tab === "past" ? "past-week" : "upcoming");
}

  activeDateFilter = f;
  activeTab = f.startsWith("past") ? "past" : "upcoming";

function setMode(mode) {

function useMyLocation() {
  const btn = document.getElementById("geo-btn");
  btn.textContent = "📍 Detecting..."; btn.disabled = true;
  if (!navigator.geolocation) { btn.textContent = "📍 Not supported"; btn.disabled = false; return; }
  navigator.geolocation.getCurrentPosition(
    pos => {
      fetch(`https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json&accept-language=en`)
        .then(r => r.json()).then(data => {
          const addr = data.address || {};
          const city = addr.city||addr.town||addr.village||""; const state = addr.state||""; const country = addr.country||"";
          const regionEl = document.getElementById("filter-region");
          if (["United States","Canada","Mexico"].some(c => country.includes(c)||c.includes(country))) regionEl.value = "North America";
          else if (["Brazil","Argentina","Colombia","Chile","Peru"].some(c => country.includes(c))) regionEl.value = "South America";
          else if (["United Kingdom","France","Germany","Spain","Italy","Netherlands"].some(c => country.includes(c))) regionEl.value = "Europe";
          else if (["China","Japan","India","South Korea","Indonesia"].some(c => country.includes(c))) regionEl.value = "Asia";
          else if (["Nigeria","Kenya","South Africa","Ethiopia","Ghana"].some(c => country.includes(c))) regionEl.value = "Africa";
          else if (["Australia","New Zealand","Papua New Guinea"].some(c => country.includes(c))) regionEl.value = "Oceania";
          onRegionChange();
          const countEl = document.getElementById("filter-country");
          if (country.includes("United States")||country.includes("USA")) {
            countEl.value = "United States"; onCountryChange();
            if (state) { const match = US_STATES.find(s => s.toLowerCase()===state.toLowerCase()); if (match) document.getElementById("filter-state").value = match; }
          } else if (country.includes("Canada")) countEl.value = "Canada";
          else if (country.includes("Mexico")) countEl.value = "Mexico";
          renderEvents();
          btn.textContent = `📍 ${[city,state].filter(Boolean).join(", ")||country||"Location set"}`; btn.disabled = false;
        }).catch(() => { btn.textContent = "📍 Try again"; btn.disabled = false; alert("Location detected but couldn't look up your city. Please select manually."); });
    },
    err => {
      btn.disabled = false;
      if (err.code === 1) { btn.textContent = "📍 Permission denied"; alert("Location access was blocked. Please allow location in your browser settings, or select manually."); }
      else { btn.textContent = "📍 Use my location"; alert("Could not detect your location. Please select manually."); }
    }, { timeout:10000 }
  );
}

function getNextOccurrences(template, count) {
  const results = [];
  const now = new Date();
  const d   = new Date();
  d.setHours(0,0,0,0);
  let daysUntil = (template.dayOfWeek - d.getDay() + 7) % 7;
  if (daysUntil === 0) {
    const [endH,endM] = (template.endtime||template.time).split(":").map(Number);
    const endToday = new Date(); endToday.setHours(endH,endM,0,0);
    if (now > endToday) daysUntil = 7;
  }
  d.setDate(d.getDate() + daysUntil);
  for (let i = 0; i < count; i++) {
    const dateStr = d.toISOString().split("T")[0];
    const slug    = template.title.toLowerCase().replace(/\s+/g,"-");
    results.push({ ...template, id:`recurring-${slug}-${dateStr}`, date:dateStr, passcode:"", going:0, recurring:true });
    d.setDate(d.getDate() + 7);
  }
  return results;
}

function getAllRecurring(count = 2) { return RECURRING_EVENTS.flatMap(t => getNextOccurrences(t, count)); }

function getPublicRecurring(count = 2) {
  const generated = RECURRING_EVENTS.filter(t => !t.adminOnly).flatMap(t => getNextOccurrences(t, count));
  const seen = new Set(events.map(e => `${e.room}|${e.date}|${e.time}`));
  return generated.filter(rec => !seen.has(`${rec.room}|${rec.date}|${rec.time}`));
}

function fmtDate(date, time, endtime) {
  if (!date) return "Date TBD";
  const d  = new Date(date+"T"+(time||"00:00"));
  const ds = d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
  if (!time) return ds;
  const tz = d.toLocaleTimeString("en-US",{timeZoneName:"short"}).split(" ").pop();
  const ts = d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
  if (!endtime) return ds + " · " + ts + " " + tz;
  const te = new Date(date+"T"+endtime).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
  return ds + " · " + ts + " - " + te + " " + tz;
}
function escNl(s) { return esc(s).replace(/\n/g, "<br>"); }
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function trunc(s,n) { return s.length > n ? s.slice(0,n)+"…" : s; }
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

if (new URLSearchParams(window.location.search).get("embed") === "1") {
  document.body.classList.add("embed-mode");
}

const savedMode   = localStorage.getItem("db-mode");

renderPills();

setMode(savedMode === 'virtual' ? 'all' : (savedMode || activeMode));
