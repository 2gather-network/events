<!DOCTYPE html>
<!--
  myevents.html Version 1.26
  v1.26 - attendee count + photos on hosting cards; loadAttendeesForHost
  v1.25 - prior version
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Events</title>
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/2Gather-Network/events/main/images/2gather_logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1B6896;
      --dark: #1a1a2e;
      --muted: #6b7280;
      --border: #e5e7eb;
      --bg: #f9fafb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito Sans', sans-serif; background: var(--bg); color: var(--dark); min-height: 100vh; }
    .header { background: #1B6896; padding: 14px 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; width: 100%; }
    header img { height: 28px; width: auto; display: block; }

    .btn-white { background: rgba(255,255,255,0.95); color: #154F74; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap; }
    .btn-white:hover { background: white; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px 16px; }
    .save-btn { margin-left: auto; background: none; border: 1.5px solid var(--border); border-radius: 8px; padding: 7px 12px; font-size: 13px; font-weight: 700; color: var(--dark); cursor: pointer; white-space: nowrap; }
    .section-title { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 12px; }
    .event-card { background: #fff; border-radius: 12px; border: 1px solid var(--border); padding: 16px; margin-bottom: 12px; }
    .event-title { font-size: 16px; font-weight: 800; color: var(--dark); margin-bottom: 4px; text-decoration: none; display: block; }
    .event-title:hover { color: var(--primary); }
    .event-meta { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
    .event-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; text-decoration: none; border: none; font-family: inherit; }
    .btn-outline { background: #fff; border: 1.5px solid var(--border); color: var(--dark); }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
    .btn-danger { background: #fff; border: 1.5px solid #fca5a5; color: #dc2626; }
    .who-going { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .who-going a img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); display: block; }
    .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 15px; }
    .loading { text-align: center; padding: 40px 20px; color: var(--muted); }
    .spinner { width: 28px; height: 28px; border: 3px solid #e5e7eb; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .tab-bar { display: flex; gap: 4px; margin-bottom: 12px; }
    .tab-btn { background: none; border: none; padding: 7px 14px; font-size: 13px; font-weight: 700; color: var(--muted); cursor: pointer; border-radius: 8px; font-family: inherit; }
    .tab-btn.active { background: var(--primary); color: #fff; }
    .toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); background: #1a1a2e; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: 700; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="header">
  <img src="https://raw.githubusercontent.com/2Gather-Network/events/main/images/2gather_logo.png" alt="2Gather" style="height:28px;width:auto;flex-shrink:0;">
  <span style="color:rgba(255,255,255,0.85);font-size:13px;font-weight:700;flex:1;">My Events</span>
  <button id="header-card-badge" onclick="copyMemberCard()" class="btn-white" style="display:none;">💳 &nbsp;<span id="header-card-number"></span></button>
</div>

<div class="container">


  <div id="loading" class="loading">
    <div class="spinner"></div>
    Loading your events...
  </div>

  <div id="not-found" style="display:none;" class="empty">
    <p style="font-size:32px;margin-bottom:12px;">💳</p>
    <p style="font-size:16px;font-weight:700;color:var(--dark);margin-bottom:8px;">No Member Card found</p>
    <p style="margin-bottom:16px;">Register for an event using your member card, or get one on Appear Network.</p>
    <a href="https://appear.network" style="display:inline-block;margin-bottom:10px;padding:10px 20px;background:var(--primary);color:#fff;border-radius:8px;font-weight:700;text-decoration:none;">Get your Member Card on Appear</a><br>

  </div>

  <div id="empty" style="display:none;" class="empty">
    <p style="font-size:32px;margin-bottom:12px;">📅</p>
    <p>No upcoming events registered yet.</p>
  </div>

  <div id="events-list"></div>

  <!-- Find/Edit Event by PIN - logged in only -->
  <div id="edit-event-section" style="display:none;margin-top:32px;padding-top:24px;border-top:1px solid var(--border);">
    <button onclick="openFindByPin()" style="background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;text-decoration:underline;padding:0;">🔑 Edit event</button>
  </div>

  <!-- PIN Modal -->
  <div id="pin-find-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:14px;padding:24px;max-width:320px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.2);">
      <div style="font-size:16px;font-weight:700;color:var(--dark);margin-bottom:8px;">Find your event</div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:14px;">Enter the 4-digit PIN you set when posting your event.</p>
      <input id="pin-find-input" type="number" maxlength="4" placeholder="4-digit PIN"
        style="width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;font-size:16px;font-family:inherit;color:var(--dark);outline:none;margin-bottom:8px;letter-spacing:4px;text-align:center;">
      <p id="pin-find-error" style="display:none;font-size:12px;color:#dc2626;margin-bottom:8px;"></p>
      <div style="display:flex;gap:8px;">
        <button onclick="submitFindPin()" class="btn-white" style="flex:1;background:#1B6896;color:#fff;border:none;border-radius:8px;padding:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">Find event</button>
        <button onclick="closeFindPin()" class="btn-white" style="border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;cursor:pointer;font-family:inherit;">Cancel</button>
      </div>
    </div>
  </div>

  <!-- My Interests Section -->
</div>

<div class="toast" id="toast"></div>

<script>
const GS_URL = "https://script.google.com/macros/s/AKfycbzEavMnG4tMeWemoT5FLu9f_zjlKVIJsZLueG4nhw9akK0_nZqpbkZiXrAlWu1Fyhq9/exec";
const APPEAR_BASE = "https://appear.network/dl/page/s/e13594/r/";
let _appearId = null;
let _allEvents = [];

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

function copyMemberCard() {
  if (!_appearId) return;
  navigator.clipboard.writeText(_appearId).then(function() {
    showToast("Member card code copied!");
  }).catch(function() {
    showToast("Your code: " + _appearId);
  });
}

function parseEvDate(dateVal) {
  if (!dateVal) return null;
  // Handle both "2026-05-24" and "2026-05-24T00:00:00.000Z"
  const str = String(dateVal).slice(0, 10);
  if (!/^\d{4}-\d{2}-\d{2}$/.test(str)) return null;
  return new Date(str + "T23:59:00");
}

function safeTime(ev) {
  // Apps Script returns raw sheet columns - startTime is the column name
  const t = ev.startTime || ev.time || "";
  if (!t || String(t).trim() === "" || String(t).trim() === "00:00") return "";
  return String(t).trim();
}

function formatDate(dateStr, time) {
  if (!dateStr) return "";
  const d = new Date(String(dateStr).slice(0,10) + "T12:00");
  const dayNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  let s = dayNames[d.getDay()] + ", " + monthNames[d.getMonth()] + " " + d.getDate();
  if (time && String(time).trim() !== "00:00" && String(time).trim() !== "0:00" && String(time).trim() !== "") {
    const parts = String(time).split(":").map(Number);
    const h = parts[0], m = parts[1] || 0;
    if (h > 0 || m > 0) {
      const ampm = h >= 12 ? "PM" : "AM";
      s += " · " + (h % 12 || 12) + ":" + String(m).padStart(2,"0") + " " + ampm;
    }
  }
  return s;
}

function addToCalendar(ev) {
  const pad = n => String(n).padStart(2,"0");
  const toGCal = (d,t) => { const dt = new Date(d+"T"+(t||"00:00")); return dt.getFullYear()+pad(dt.getMonth()+1)+pad(dt.getDate())+"T"+pad(dt.getHours())+pad(dt.getMinutes())+"00"; };
  const start = toGCal(ev.date, ev.startTime);
  const end = ev.endTime ? toGCal(ev.date, ev.endTime) : toGCal(ev.date, ev.startTime);
  const desc = (ev.description || "").length > 400 ? (ev.description||"").slice(0,400)+"..." : (ev.description||"");
  const params = new URLSearchParams({ text: ev.title, dates: start+"/"+end, details: desc, location: ev.location||ev.meetinglink||"" });
  window.open("https://calendar.google.com/calendar/r/eventedit?" + params.toString(), "_blank");
}

function switchHostTab(tab) {
  document.getElementById("host-upcoming").style.display = tab === "upcoming" ? "block" : "none";
  document.getElementById("host-past").style.display = tab === "past" ? "block" : "none";
  document.getElementById("host-tab-upcoming").className = "tab-btn" + (tab === "upcoming" ? " active" : "");
  document.getElementById("host-tab-past").className = "tab-btn" + (tab === "past" ? " active" : "");
}

async function cancelRsvp(eventId) {
  if (!confirm("Cancel your RSVP for this event?")) return;
  try {
    await fetch(`${GS_URL}?action=cancelRsvp&appearId=${encodeURIComponent(_appearId)}&eventId=${encodeURIComponent(eventId)}`);
    try { localStorage.removeItem("db-interested-" + eventId); } catch(e) {}
    showToast("RSVP cancelled.");
    setTimeout(() => location.reload(), 1500);
  } catch(e) { showToast("Error cancelling. Please try again."); }
}

function renderEvents(registrations, events) {
  const now = new Date();
  now.setHours(0,0,0,0);

  // Hosted events - upcoming (includes recurring occurrences)
  const normalCard = _appearId.replace(/\./g,"").toLowerCase();

  // One-time hosted events
  const hostedOnce = events
    .filter(function(ev) {
      return ev.hostMemberCard && ev.hostMemberCard.toString().replace(/\./g,"").toLowerCase() === normalCard;
    })
    .filter(function(ev) { return ev.date && parseEvDate(ev.date) >= now; });

  // Recurring hosted events - generate next 8 occurrences, grouped by event
  const hostedRecByTitle = {};
  events
    .filter(function(ev) {
      return ev.hostMemberCard && ev.hostMemberCard.toString().replace(/\./g,"").toLowerCase() === normalCard
        && ev.recurFreq && ev.id && ev.id.startsWith("rec-");
    })
    .forEach(function(rec) {
      const dayOfWeek = parseInt(rec.dayOfWeek) || 0;
      const freq = rec.recurFreq;
      const d = new Date();
      d.setHours(0,0,0,0);
      const dates = [];
      for (let i = 0; i < 60 && dates.length < 8; i++) {
        const check = new Date(d);
        check.setDate(d.getDate() + i);
        const match = freq === "weekly" ? check.getDay() === dayOfWeek :
                      freq === "monthly" ? check.getDate() === (new Date(now).getDate()) : false;
        if (match && check >= now) {
          dates.push(check.toISOString().slice(0,10));
        }
      }
      if (dates.length > 0) {
        hostedRecByTitle[rec.title || rec.id] = { rec, dates };
      }
    });

  const hosted = hostedOnce
    .sort(function(a,b) { return new Date(a.date) - new Date(b.date); });

  // RSVPd events - active, upcoming
  const active = registrations
    .filter(r => r.cancelled !== "true")
    .map(r => {
      const ev = events.find(e => e.id === r.eventId);
      return ev ? { ...ev, _rsvp: r } : null;
    })
    .filter(Boolean)
    .filter(ev => ev.date && parseEvDate(ev.date) >= now)
    .sort((a,b) => new Date(a.date) - new Date(b.date));

  // Cancelled RSVPs
  const cancelled = registrations
    .filter(r => r.cancelled === "true")
    .map(r => {
      const ev = events.find(e => e.id === r.eventId);
      return ev ? { ...ev, _rsvp: r } : null;
    })
    .filter(Boolean)
    .sort((a,b) => new Date(b.date) - new Date(a.date));

  document.getElementById("loading").style.display = "none";

  if (hosted.length === 0 && active.length === 0) {
    document.getElementById("empty").style.display = "block";
    return;
  }

  const list = document.getElementById("events-list");
  list.innerHTML = "";

  // Hosting section - split upcoming/past
  const hostedUpcoming = hosted.filter(function(ev) { return parseEvDate(ev.date) >= now; });
  const hostedPast = events
    .filter(function(ev) {
      return ev.hostMemberCard && ev.hostMemberCard.toString().replace(/\./g,"").toLowerCase() === normalCard;
    })
    .filter(function(ev) { return ev.date && parseEvDate(ev.date) < now; })
    .sort(function(a,b) { return new Date(b.date) - new Date(a.date); });

  if (hostedUpcoming.length > 0 || hostedPast.length > 0) {
    // Section title + Add event button
    const hostHeader = document.createElement("div");
    hostHeader.style.cssText = "display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;";
    const savedId = _appearId || "";
    hostHeader.innerHTML = `
      <div class="section-title" style="margin-bottom:0;">Hosting</div>
      <a href="https://gather.2gather.network/events.html?action=post${savedId ? '&memberCard=' + encodeURIComponent(savedId) : ''}" class="btn-white" style="border:1.5px solid #1B6896;color:#1B6896;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:700;text-decoration:none;white-space:nowrap;">+ Post an event</a>`;
    list.appendChild(hostHeader);

    // Tab bar
    const tabBar = document.createElement("div");
    tabBar.className = "tab-bar";
    const recCount = Object.keys(hostedRecByTitle).length;
    tabBar.innerHTML = `
      <button class="tab-btn active" id="host-tab-upcoming" onclick="switchHostTab('upcoming')">Upcoming (${hostedUpcoming.length + recCount})</button>
      <button class="tab-btn" id="host-tab-past" onclick="switchHostTab('past')">Past (${hostedPast.length})</button>`;
    list.appendChild(tabBar);

    // Upcoming container
    const upcomingContainer = document.createElement("div");
    upcomingContainer.id = "host-upcoming";
    if (hostedUpcoming.length === 0) {
      upcomingContainer.innerHTML = '<p style="font-size:13px;color:var(--muted);padding:12px 0;">No upcoming hosted events.</p>';
    }
    hostedUpcoming.forEach(function(ev) {
      const card = document.createElement("div");
      card.className = "event-card";
      card.style.borderLeft = "3px solid var(--primary)";
      card.innerHTML = `
        <a class="event-title" href="event.html?id=${encodeURIComponent(ev.id)}">${ev.title || "Untitled"}</a>
        <div class="event-meta">${formatDate(ev.date, safeTime(ev))}${ev.location ? " · " + ev.location : ""}</div>
        <div id="who-${ev.id}" class="who-going"></div>
        <div class="event-actions">
          <button class="btn btn-outline" onclick='addToCalendar(${JSON.stringify({title:ev.title,date:ev.date,startTime:ev.startTime||ev.time,endTime:ev.endTime||ev.endtime,description:ev.description,location:ev.location,meetinglink:ev.meetinglink})})'>📅 Add to calendar</button>
          <a href="event.html?id=${encodeURIComponent(ev.id)}" class="btn btn-outline">✏️ Manage</a>
        </div>`;
      upcomingContainer.appendChild(card);
      loadAttendeesForHost(ev.id);
    });

    // Recurring events - one card per event with date dropdown
    Object.values(hostedRecByTitle).forEach(function(group) {
      const rec = group.rec;
      const dates = group.dates;
      const slug = rec.id.replace(/^rec-/,"");
      const selectId = "rec-date-" + slug;
      const card = document.createElement("div");
      card.className = "event-card";
      card.style.borderLeft = "3px solid #AED6F1";
      card.innerHTML = `
        <div class="event-title" style="margin-bottom:8px;">${rec.title || "Untitled"} <span style="font-size:11px;font-weight:700;background:#E8F2F9;color:var(--primary);padding:2px 8px;border-radius:20px;margin-left:4px;">🔁 Weekly</span></div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px;">
          <select id="${selectId}" style="border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;font-size:13px;font-family:inherit;color:var(--dark);cursor:pointer;" onchange="loadAttendeesForHost(this.value, 'who-rec-${slug}')">
            ${dates.map(function(d) { return `<option value="recurring-${slug}-${d}">${formatDate(d, rec.startTime || "")}</option>`; }).join("")}
          </select>
        </div>
        <div id="who-rec-${slug}" class="who-going"></div>
        <div class="event-actions">
          <button class="btn btn-outline" onclick="window.location.href='event.html?id='+document.getElementById('${selectId}').value">✏️ Manage</button>
        </div>`;
      upcomingContainer.appendChild(card);
      // Load attendees for first date
      if (dates.length > 0) loadAttendeesForHost("recurring-" + slug + "-" + dates[0], "who-rec-" + slug);
    });
    list.appendChild(upcomingContainer);

    // Past container
    const pastContainer = document.createElement("div");
    pastContainer.id = "host-past";
    pastContainer.style.display = "none";
    if (hostedPast.length === 0) {
      pastContainer.innerHTML = '<p style="font-size:13px;color:var(--muted);padding:12px 0;">No past hosted events.</p>';
    }
    hostedPast.forEach(function(ev) {
      const card = document.createElement("div");
      card.className = "event-card";
      card.style.opacity = "0.7";
      card.innerHTML = `
        <a class="event-title" href="event.html?id=${encodeURIComponent(ev.id)}">${ev.title || "Untitled"}</a>
        <div class="event-meta">${formatDate(ev.date, safeTime(ev))}${ev.location ? " · " + ev.location : ""}</div>`;
      pastContainer.appendChild(card);
    });
    list.appendChild(pastContainer);
  }

  // Going section
  if (active.length > 0) {
    const goingTitle = document.createElement("div");
    goingTitle.className = "section-title";
    goingTitle.style.marginTop = hosted.length > 0 ? "24px" : "0";
    goingTitle.textContent = `Going (${active.length})`;
    list.appendChild(goingTitle);

    active.forEach(ev => {
      const card = document.createElement("div");
      card.className = "event-card";
      card.innerHTML = `
        <a class="event-title" href="event.html?id=${encodeURIComponent(ev.id)}">${ev.title || "Untitled"}</a>
        <div class="event-meta">${formatDate(ev.date, safeTime(ev))}${ev.location ? " · " + ev.location : ""}</div>
        <div class="event-actions">
          <button class="btn btn-outline" onclick='addToCalendar(${JSON.stringify({title:ev.title,date:ev.date,startTime:ev.startTime||ev.time,endTime:ev.endTime||ev.endtime,description:ev.description,location:ev.location,meetinglink:ev.meetinglink})})'>📅 Add to calendar</button>
          <button class="btn btn-danger" onclick="cancelRsvp('${ev.id}')">✕ Cancel RSVP</button>
        </div>
        <div id="who-${ev.id}" class="who-going"></div>
      `;
      list.appendChild(card);
      loadAttendees(ev.id);
    });
  }

  // Cancelled section
  if (cancelled.length > 0) {
    const cancelTitle = document.createElement("div");
    cancelTitle.className = "section-title";
    cancelTitle.style.marginTop = "24px";
    cancelTitle.textContent = `Cancelled RSVPs (${cancelled.length})`;
    list.appendChild(cancelTitle);

    cancelled.forEach(ev => {
      const card = document.createElement("div");
      card.className = "event-card";
      card.style.opacity = "0.5";
      card.innerHTML = `
        <a class="event-title" href="event.html?id=${encodeURIComponent(ev.id)}" style="text-decoration:line-through;">${ev.title || "Untitled"}</a>
        <div class="event-meta">${formatDate(ev.date, safeTime(ev))}</div>
      `;
      list.appendChild(card);
    });
  }
}

async function loadAttendeesForHost(eventId, containerId) {
  const container = document.getElementById(containerId || "who-" + eventId);
  if (!container) return;
  try {
    const res = await fetch(`${GS_URL}?action=getAttendees&eventId=${encodeURIComponent(eventId)}`);
    const data = await res.json();
    if (!data.attendees || data.attendees.length === 0) {
      container.innerHTML = `<p style="font-size:12px;color:var(--muted);margin-top:8px;">No registrations yet.</p>`;
      return;
    }
    const count = data.attendees.length;
    container.innerHTML = `<p style="font-size:12px;font-weight:700;color:var(--primary);margin:8px 0 6px;">${count} registered${count === 1 ? "" : ""}</p>`;
    const row = document.createElement("div");
    row.style.cssText = "display:flex;flex-wrap:wrap;gap:6px;";
    data.attendees.forEach(a => {
      const link = document.createElement("a");
      link.href = APPEAR_BASE + encodeURIComponent(a.appearId);
      link.title = a.appearId;
      const img = document.createElement("img");
      img.src = a.profileUrl || a.photo || "";
      img.alt = a.appearId;
      img.style.cssText = "width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--border);display:block;";
      img.onerror = () => { img.src = "https://ui-avatars.com/api/?name=" + encodeURIComponent(a.appearId) + "&size=36&background=EEF4F9&color=1B6896"; };
      link.appendChild(img);
      row.appendChild(link);
    });
    container.appendChild(row);
  } catch(e) {
    container.innerHTML = "";
  }
}

async function loadAttendees(eventId) {
  try {
    const res = await fetch(`${GS_URL}?action=getAttendees&eventId=${encodeURIComponent(eventId)}`);
    const data = await res.json();
    if (!data.attendees || data.attendees.length === 0) return;
    const container = document.getElementById("who-" + eventId);
    if (!container) return;
    const label = document.createElement("p");
    label.style.cssText = "font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;margin-top:12px;";
    label.textContent = "Others going";
    container.appendChild(label);
    data.attendees.forEach(a => {
      if (a.appearId === _appearId) return; // skip self
      const link = document.createElement("a");
      link.href = APPEAR_BASE + encodeURIComponent(a.appearId);
      const img = document.createElement("img");
      img.src = a.profileUrl || a.photo || "";
      img.alt = a.appearId;
      img.title = a.appearId;
      img.onerror = () => { img.src = "https://ui-avatars.com/api/?name=" + a.appearId + "&size=36"; };
      link.appendChild(img);
      container.appendChild(link);
    });
  } catch(e) {}
}

async function init() {
  // Get Member Card number from URL or localStorage
  const params = new URLSearchParams(window.location.search);
  _appearId = params.get("id") || (function(){ try { return localStorage.getItem("appear-id"); } catch(e) { return null; } })() || params.get("memberCard");

  if (!_appearId) {
    document.getElementById("loading").style.display = "none";
    document.getElementById("not-found").style.display = "block";
    return;
  }

  // Update URL if came from localStorage
  if (!params.get("id")) {
    history.replaceState(null, "", "myevents.html?id=" + encodeURIComponent(_appearId));
  }


  // Show member card badge in header
  const badge = document.getElementById("header-card-badge");
  const badgeNum = document.getElementById("header-card-number");
  if (badge && badgeNum) { badgeNum.textContent = _appearId; badge.style.display = "flex"; }

  // Show logged-in only sections
  const editSection = document.getElementById("edit-event-section");
  if (editSection) editSection.style.display = "block";

  // Load registrations + all events in parallel
  try {
    const [regRes, evRes] = await Promise.all([
      fetch(`${GS_URL}?action=getRegistrations&appearId=${encodeURIComponent(_appearId)}`),
      fetch(`${GS_URL}?t=${Date.now()}`)
    ]);
    const regData = await regRes.json();
    const evData = await evRes.json();
    const allEvents = (evData.events || []).filter(function(r) { return r.id; });
    renderEvents(regData.registrations || [], allEvents);
    initInterests(allEvents);
  } catch(e) {
    document.getElementById("loading").style.display = "none";
    document.getElementById("empty").style.display = "block";
  }
}

// ── My Interests ────────────────────────────────────────────────
let _allEventsCache = [];
let _userLat = null, _userLng = null;

function loadInterests() {
  try { return JSON.parse(localStorage.getItem("my-interests") || "[]"); } catch(e) { return []; }
}
function saveInterests(arr) {
  try { localStorage.setItem("my-interests", JSON.stringify(arr)); } catch(e) {}
}

function renderInterestChips() {
  const chips = document.getElementById("interest-chips");
  if (!chips) return;
  const interests = loadInterests();
  chips.innerHTML = interests.map(function(kw) {
    return `<span style="display:inline-flex;align-items:center;gap:6px;background:#EBF5FB;border:1px solid #AED6F1;border-radius:20px;padding:5px 12px;font-size:13px;font-weight:600;color:#1B6896;">
      ${kw}
      <button onclick="removeInterest('${kw.replace(/'/g,"\\'")}') " style="background:none;border:none;color:#1B6896;cursor:pointer;font-size:14px;line-height:1;padding:0;">×</button>
    </span>`;
  }).join("");
}

function removeInterest(kw) {
  const arr = loadInterests().filter(function(k) { return k !== kw; });
  saveInterests(arr);
  renderInterestChips();
  renderInterestResults();
}

function addInterestFromInput() {
  const input = document.getElementById("interest-input");
  if (!input) return;
  const val = input.value.trim();
  if (!val) return;
  const arr = loadInterests();
  if (!arr.includes(val)) { arr.push(val); saveInterests(arr); }
  input.value = "";
  document.getElementById("interest-autocomplete").style.display = "none";
  renderInterestChips();
  renderInterestResults();
}

function onInterestKeydown(e) {
  if (e.key === "Enter") { e.preventDefault(); addInterestFromInput(); }
  if (e.key === "Escape") { document.getElementById("interest-autocomplete").style.display = "none"; }
}

function onInterestInput(e) {
  const val = e.target.value.trim().toLowerCase();
  const ac = document.getElementById("interest-autocomplete");
  if (!val || val.length < 2) { ac.style.display = "none"; return; }
  // Build suggestions from all events
  const suggestions = new Set();
  _allEventsCache.forEach(function(ev) {
    [ev.title, ev.keywords, ev.categories, ev.description].forEach(function(field) {
      if (!field) return;
      String(field).split(/[,\s]+/).forEach(function(word) {
        const w = word.trim().toLowerCase();
        if (w.length > 2 && w.includes(val)) suggestions.add(word.trim());
      });
    });
  });
  const filtered = Array.from(suggestions).slice(0, 8);
  if (filtered.length === 0) { ac.style.display = "none"; return; }
  ac.innerHTML = filtered.map(function(s) {
    return `<div onclick="selectSuggestion('${s.replace(/'/g,"\\'")}') " style="padding:9px 14px;font-size:13px;cursor:pointer;color:var(--dark);border-bottom:1px solid var(--border);">${s}</div>`;
  }).join("");
  ac.style.display = "block";
}

function selectSuggestion(val) {
  document.getElementById("interest-input").value = val;
  document.getElementById("interest-autocomplete").style.display = "none";
  addInterestFromInput();
}

function haversineKm(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)*Math.sin(dLat/2) +
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function renderInterestResults() {
  const interests = loadInterests();
  const list = document.getElementById("interests-list");
  const emptyEl = document.getElementById("interests-empty");
  const showAllWrap = document.getElementById("interests-show-all");
  if (!list) return;

  if (interests.length === 0) {
    list.innerHTML = "";
    if (emptyEl) emptyEl.style.display = "none";
    if (showAllWrap) showAllWrap.style.display = "none";
    return;
  }

  const showAll = document.getElementById("interests-all-toggle")?.checked;
  const now = new Date(); now.setHours(0,0,0,0);
  const twoWeeks = new Date(now); twoWeeks.setDate(twoWeeks.getDate() + 14);
  const RADIUS_KM = 80;

  const matched = _allEventsCache.filter(function(ev) {
    const d = parseEvDate(ev.date);
    if (!d) return false;
    if (d < now) return false;
    if (!showAll && d > twoWeeks) return false;

    // Location filter - include virtual always
    const isVirtual = (ev.format || "").toLowerCase().includes("virtual");
    if (!isVirtual && _userLat && _userLng && ev.lat && ev.lng) {
      const dist = haversineKm(_userLat, _userLng, parseFloat(ev.lat), parseFloat(ev.lng));
      if (dist > RADIUS_KM) return false;
    }

    // Keyword match
    const haystack = [ev.title, ev.keywords, ev.categories, ev.description, ev.host, ev.location]
      .filter(Boolean).join(" ").toLowerCase();
    return interests.some(function(kw) { return haystack.includes(kw.toLowerCase()); });
  }).sort(function(a,b) { return new Date(a.date) - new Date(b.date); });

  if (showAllWrap) showAllWrap.style.display = interests.length > 0 ? "block" : "none";

  if (matched.length === 0) {
    list.innerHTML = "";
    if (emptyEl) emptyEl.style.display = "block";
    return;
  }
  if (emptyEl) emptyEl.style.display = "none";

  list.innerHTML = matched.map(function(ev) {
    return `<div class="event-card" style="margin-bottom:10px;">
      <a class="event-title" href="event.html?id=${encodeURIComponent(ev.id)}">${ev.title || "Untitled"}</a>
      <div class="event-meta">${formatDate(ev.date, safeTime(ev))}${ev.location ? " · " + ev.location : ""}${ev.format && ev.format.includes("virtual") ? " · 💻 Virtual" : ""}</div>
    </div>`;
  }).join("");
}

function initInterests(allEvents) {
  _allEventsCache = allEvents;
  renderInterestChips();
  // Get location
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(pos) {
      _userLat = pos.coords.latitude;
      _userLng = pos.coords.longitude;
      renderInterestResults();
    }, function() {
      renderInterestResults(); // fallback without location
    }, { timeout: 5000 });
  } else {
    renderInterestResults();
  }
}

// ── Find event by PIN ───────────────────────────────────────────
function openFindByPin() {
  const modal = document.getElementById("pin-find-modal");
  if (modal) { modal.style.display = "flex"; document.getElementById("pin-find-input").value = ""; document.getElementById("pin-find-error").style.display = "none"; setTimeout(() => document.getElementById("pin-find-input").focus(), 100); }
}

function closeFindPin() {
  const modal = document.getElementById("pin-find-modal");
  if (modal) modal.style.display = "none";
}

async function submitFindPin() {
  const pin = (document.getElementById("pin-find-input").value || "").trim();
  const errEl = document.getElementById("pin-find-error");
  if (!pin || pin.length < 4) { errEl.textContent = "Please enter your 4-digit PIN."; errEl.style.display = "block"; return; }
  errEl.style.display = "none";
  // Find event with this PIN in events list
  const matched = _allEventsCache.filter(function(ev) { return String(ev.passcode || "").trim() === pin; });
  if (matched.length === 0) { errEl.textContent = "No event found with that PIN."; errEl.style.display = "block"; return; }
  // If one match go straight to edit, if multiple show list
  if (matched.length === 1) {
    closeFindPin();
    window.location.href = "events.html?edit=" + encodeURIComponent(matched[0].id) + "&pin=" + encodeURIComponent(pin);
  } else {
    // Multiple events - show titles to pick
    const pick = matched.map(function(ev) { return ev.title + " (" + (ev.date||"recurring") + ")"; }).join("\n");
    errEl.textContent = "Multiple events found. Opening first match.";
    errEl.style.display = "block";
    setTimeout(function() {
      closeFindPin();
      window.location.href = "events.html?edit=" + encodeURIComponent(matched[0].id) + "&pin=" + encodeURIComponent(pin);
    }, 1500);
  }
}

init();
</script>
