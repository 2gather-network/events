<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DayBalancer · Community Events</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #1B6896; --primary-dark: #154F74; --primary-light: #E8F2F9;
    --green: #4CAF7D; --light: #F5F7FA; --border: #DCE3EA;
    --dark: #2C3A47; --muted: #6B7C8D; --white: #FFFFFF;
  }
  body { font-family: 'Nunito Sans','Segoe UI',sans-serif; background:var(--light); color:var(--dark); min-height:100vh; }

  .header { background:var(--primary); padding:14px 28px; display:flex; align-items:center; gap:12px; }
  .logo { font-size:22px; font-weight:800; color:white; letter-spacing:-0.3px; }
  .logo span { color:#fff; font-weight:400; }
  .tagline { font-size:11px; color:rgba(255,255,255,0.7); text-transform:uppercase; letter-spacing:.05em; }
  .header-right { margin-left:auto; }

  .btn { display:inline-block; background:var(--primary); color:white; border:none; border-radius:8px; padding:11px 22px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; transition:background .15s; white-space:nowrap; text-decoration:none; }
  .btn:hover { background:var(--primary-dark); }
  .btn-outline { background:var(--white); color:var(--dark); border:1.5px solid var(--border); }
  .btn-outline:hover { background:var(--light); }
  .btn-green { background:var(--green); color:white; border:none; }
  .btn-green:hover { background:#3d9e6a; }
  .btn-sm { padding:8px 14px; font-size:13px; }
  .btn-white { background:rgba(255,255,255,.95); color:var(--primary-dark); }
  .btn-white:hover { background:white; }

  .input,.textarea { width:100%; border:1.5px solid var(--border); border-radius:8px; padding:11px 16px; font-size:15px; font-family:inherit; color:var(--dark); background:var(--white); outline:none; transition:border-color .15s; }
  .input:focus,.textarea:focus { border-color:var(--primary); }
  .textarea { resize:vertical; min-height:90px; }
  .field-label { display:block; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin-bottom:6px; }
  .field { margin-bottom:18px; }

  .page-body { max-width:980px; margin:0 auto; padding:28px 24px; }
  .page-title-row { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
  .page-title { font-size:28px; font-weight:800; }
  .page-sub { color:var(--muted); font-size:15px; margin-top:4px; }

  .filter-row { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
  .filter-search { flex:1; min-width:200px; border:1.5px solid var(--border); border-radius:8px; padding:9px 14px; font-size:14px; font-family:inherit; color:var(--dark); background:var(--white); outline:none; }
  .filter-search:focus { border-color:var(--primary); }

  .cat-pills { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:24px; }
  .cat-pill { background:var(--white); border:1.5px solid var(--border); border-radius:20px; padding:5px 14px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; color:var(--muted); transition:all .15s; white-space:nowrap; }
  .cat-pill:hover { border-color:var(--primary); color:var(--primary); }
  .cat-pill.active { background:#154F74; border-color:#154F74; color:white; }

  /* Form category chips */
  .form-cat-chips { display:flex; gap:8px; flex-wrap:wrap; }
  .form-cat-chip { background:var(--white); border:1.5px solid var(--border); border-radius:20px; padding:6px 14px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; color:var(--muted); transition:all .15s; white-space:nowrap; user-select:none; }
  .form-cat-chip:hover { border-color:var(--primary); color:var(--primary); }
  .form-cat-chip.selected { background:#154F74; border-color:#154F74; color:white; }

  .event-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
  .event-card { background:var(--white); border-radius:12px; border:1px solid var(--border); box-shadow:0 2px 6px rgba(0,0,0,.05); overflow:hidden; display:flex; flex-direction:column; transition:box-shadow .15s,transform .15s; }
  .event-card:hover { box-shadow:0 6px 18px rgba(0,0,0,.1); transform:translateY(-2px); }

  .event-card-top { padding:16px 18px 12px; border-bottom:1px solid var(--border); }
  .event-title { font-size:15px; font-weight:800; line-height:1.3; margin-bottom:8px; }
  .event-cats { display:flex; gap:6px; flex-wrap:wrap; }
  .event-cat-tag { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--primary); background:var(--primary-light); padding:3px 8px; border-radius:10px; }

  .event-card-body { padding:14px 18px; flex:1; }
  .event-meta { display:flex; flex-direction:column; gap:5px; margin-bottom:10px; }
  .event-meta-item { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--muted); }
  .event-desc { font-size:13px; color:var(--muted); line-height:1.5; }

  .event-card-footer { padding:12px 18px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
  .going-count { font-size:13px; color:var(--muted); font-weight:600; }
  .going-count span { color:var(--green); font-weight:800; }
  .room-badge { font-size:12px; font-weight:700; color:var(--primary); background:var(--primary-light); padding:5px 10px; border-radius:6px; white-space:nowrap; }

  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:100; align-items:center; justify-content:center; padding:20px; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--white); border-radius:16px; padding:32px; max-width:560px; width:100%; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.2); }
  .modal-title { font-size:22px; font-weight:800; margin-bottom:24px; }
  .modal-actions { display:flex; gap:10px; margin-top:8px; }
  .two-col { display:grid; grid-template-columns:1fr 1fr; gap:14px; }

  .room-preview { display:none; margin-bottom:18px; padding:14px 16px; background:var(--white); border-radius:8px; border:1.5px solid var(--border); }
  .room-preview-label { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin-bottom:10px; }
  .room-chip { background:var(--light); border:1.5px solid var(--border); border-radius:20px; padding:6px 14px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; color:var(--dark); transition:all .15s; white-space:nowrap; }
  .room-chip:hover { border-color:var(--primary); color:var(--primary); background:var(--white); }
  .room-chip.selected { background:#154F74; border-color:#154F74; color:white; }
  .format-chip { background:var(--white); border:1.5px solid var(--border); border-radius:20px; padding:6px 18px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; color:var(--muted); transition:all .15s; white-space:nowrap; }
  .format-chip:hover { border-color:var(--primary); color:var(--primary); }
  .format-chip.selected { background:#154F74; border-color:#154F74; color:white; }

  .empty-state { text-align:center; padding:60px 20px; color:var(--muted); grid-column:1/-1; }
  .empty-icon { font-size:48px; margin-bottom:16px; }
  .empty-title { font-size:18px; font-weight:700; margin-bottom:8px; color:var(--dark); }
  .error-msg { color:#c0392b; font-size:13px; margin-bottom:12px; display:none; }

  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--dark); color:white; padding:12px 24px; border-radius:10px; font-weight:700; font-size:14px; transition:transform .3s; z-index:200; white-space:nowrap; }
  .toast.show { transform:translateX(-50%) translateY(0); }

  @media(max-width:500px) { .two-col { grid-template-columns:1fr; } .modal { padding:24px; } }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">Day<span>Balancer</span></div>
    <div class="tagline">Community events</div>
  </div>
  <div class="header-right">
    <button class="btn btn-white btn-sm" onclick="openModal()">+ Post an event</button>
  </div>
</div>

<div class="page-body">
  <div class="page-title-row">
    <div>
      <div class="page-title">What's happening</div>
      <div class="page-sub">Events posted by DayBalancer members</div>
    </div>
  </div>
  <div class="filter-row">
    <input class="filter-search" id="search-input" placeholder="🔍  Search events..." oninput="renderEvents()">
  </div>
  <div class="cat-pills" id="cat-pills"></div>
  <div class="event-grid" id="event-grid"></div>
</div>

<!-- POST MODAL -->
<div class="modal-overlay" id="post-modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">Post an event</div>

    <div class="field">
      <label class="field-label">Event title *</label>
      <input class="input" id="f-title" placeholder="Give your event a clear name">
    </div>

    <div class="field">
      <label class="field-label">Categories * <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px;color:var(--muted);">- select all that apply</span></label>
      <div class="form-cat-chips" id="f-cat-chips"></div>
    </div>

    <div class="field">
      <label class="field-label">Virtual or in-person? *</label>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button type="button" class="format-chip" id="fmt-virtual" onclick="setFormat('virtual')">💻 Virtual</button>
        <button type="button" class="format-chip" id="fmt-inperson" onclick="setFormat('inperson')">📍 In-person</button>
        <button type="button" class="format-chip" id="fmt-both" onclick="setFormat('both')">✨ Both</button>
      </div>
    </div>

    <div class="room-preview" id="room-preview">
      <div class="room-preview-label">Which virtual room is best for this event?</div>
      <div class="form-cat-chips" id="room-options"></div>
    </div>

    <div id="location-field" style="display:none;" class="field">
      <label class="field-label">Full address</label>
      <input class="input" id="f-location" placeholder="Full address">
    </div>

    <div class="field">
      <label class="field-label">Description</label>
      <textarea class="textarea" id="f-desc" placeholder="Tell people what to expect..."></textarea>
    </div>

    <div class="two-col">
      <div class="field">
        <label class="field-label">Date *</label>
        <input class="input" id="f-date" type="date">
      </div>
      <div class="field">
        <label class="field-label">Time</label>
        <input class="input" id="f-time" type="time">
      </div>
    </div>

    <div class="field">
      <label class="field-label">Who's hosting? *</label>
      <input class="input" id="f-host" placeholder="Full name">
    </div>

    <p class="error-msg" id="post-error"></p>

    <div class="modal-actions">
      <button class="btn btn-green" style="flex:1;" id="submit-btn" onclick="submitEvent()">Post event</button>
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CATEGORIES = [
  { id:"arts",         label:"Arts/culture",       emoji:"🎭", room:"Co-create room" },
  { id:"movement",     label:"Movement",            emoji:"🏓", room:"Wellness room" },
  { id:"learning",     label:"Learning/discussion", emoji:"📚", room:"Co-create room" },
  { id:"nature",       label:"Nature",              emoji:"🌲", room:null },
  { id:"professional", label:"Professional",        emoji:"💼", room:"Conference room" },
  { id:"creative",     label:"Creative making",     emoji:"🎨", room:"Co-create room" },
  { id:"faith",        label:"Faith/spirituality",  emoji:"💙", room:"Wellness room" },
  { id:"resources",    label:"Resource sharing",    emoji:"🔧", room:"The Commons" },
  { id:"care",         label:"Community care",      emoji:"💛", room:"Community Care room" },
  { id:"social",       label:"Social gathering",    emoji:"🥘", room:"The Commons" },
  { id:"family",       label:"Family/parent",       emoji:"🏡", room:"Community Care room" },
];

let events = [];
let activeFilter = "all";
let selectedCats = new Set(); // for the form

// ── Storage ──────────────────────────────────
async function loadEvents() {
  try {
    if (window.storage) {
      const r = await window.storage.get("db-community-events", true);
      if (r) events = JSON.parse(r.value);
    } else {
      const s = localStorage.getItem("db-community-events");
      if (s) events = JSON.parse(s);
    }
  } catch(e) { events = []; }
}
async function saveEvents() {
  try {
    const data = JSON.stringify(events);
    if (window.storage) await window.storage.set("db-community-events", data, true);
    else localStorage.setItem("db-community-events", data);
  } catch(e) {}
}

// ── Build form category chips ─────────────────
function buildFormChips() {
  const container = document.getElementById("f-cat-chips");
  container.innerHTML = "";
  CATEGORIES.forEach(cat => {
    const chip = document.createElement("button");
    chip.type = "button";
    chip.className = "form-cat-chip" + (selectedCats.has(cat.id) ? " selected" : "");
    chip.textContent = `${cat.emoji} ${cat.label}`;
    chip.onclick = () => toggleFormCat(cat.id, chip);
    container.appendChild(chip);
  });
}

function toggleFormCat(id, chip) {
  if (selectedCats.has(id)) {
    selectedCats.delete(id);
    chip.classList.remove("selected");
  } else {
    selectedCats.add(id);
    chip.classList.add("selected");
  }
  updateRoomPreview();
}

let selectedRoom = null;
let selectedFormat = null;
let editingId = null; // null = new event, string = editing existing

function setFormat(fmt) {
  selectedFormat = fmt;
  ["virtual","inperson","both"].forEach(f => {
    document.getElementById("fmt-" + f).classList.toggle("selected", f === fmt);
  });
  // Show/hide location
  const showLoc = fmt === "inperson" || fmt === "both";
  document.getElementById("location-field").style.display = showLoc ? "block" : "none";
  // Show/hide room (only for virtual or both, and only if rooms available)
  updateRoomPreview();
}

function updateRoomPreview() {
  const preview = document.getElementById("room-preview");
  const roomOptions = document.getElementById("room-options");

  const showRooms = selectedCats.size > 0 && (selectedFormat === "virtual" || selectedFormat === "both");
  if (!showRooms) { preview.style.display = "none"; selectedRoom = null; return; }

  const rooms = [...new Set(
    Array.from(selectedCats)
      .map(id => CATEGORIES.find(c => c.id === id)?.room)
      .filter(Boolean)
  )];

  if (rooms.length === 0) { preview.style.display = "none"; selectedRoom = null; return; }

  if (selectedRoom && !rooms.includes(selectedRoom)) selectedRoom = null;
  if (rooms.length === 1) selectedRoom = rooms[0];

  preview.style.display = "block";
  roomOptions.innerHTML = "";
  rooms.forEach(room => {
    const chip = document.createElement("button");
    chip.type = "button";
    chip.className = "room-chip" + (selectedRoom === room ? " selected" : "");
    chip.textContent = room; // no emoji
    chip.onclick = () => {
      selectedRoom = room;
      roomOptions.querySelectorAll(".room-chip").forEach(c => c.classList.remove("selected"));
      chip.classList.add("selected");
    };
    roomOptions.appendChild(chip);
  });
}

// ── Filter pills ──────────────────────────────
function renderPills() {
  const c = document.getElementById("cat-pills");
  c.innerHTML = "";
  const all = makeFilterBtn("All events", activeFilter === "all", () => setFilter("all"));
  c.appendChild(all);
  CATEGORIES.forEach(cat => {
    const btn = makeFilterBtn(`${cat.emoji} ${cat.label}`, activeFilter === cat.id, () => setFilter(cat.id));
    c.appendChild(btn);
  });
}
function makeFilterBtn(text, isActive, onClick) {
  const b = document.createElement("button");
  b.className = "cat-pill" + (isActive ? " active" : "");
  b.textContent = text;
  b.onclick = onClick;
  return b;
}
function setFilter(id) { activeFilter = id; renderPills(); renderEvents(); }

// ── Render events ─────────────────────────────
function renderEvents() {
  const grid = document.getElementById("event-grid");
  const q = document.getElementById("search-input").value.toLowerCase();

  let list = events.filter(e => {
    const cats = Array.isArray(e.categories) ? e.categories : [e.category].filter(Boolean);
    const matchCat = activeFilter === "all" || cats.includes(activeFilter);
    const matchQ = !q ||
      e.title.toLowerCase().includes(q) ||
      (e.description||"").toLowerCase().includes(q) ||
      (e.location||"").toLowerCase().includes(q) ||
      (e.host||"").toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  const now = Date.now();
  list.sort((a, b) => {
    const da = new Date(a.date + "T" + (a.time||"00:00")).getTime();
    const db = new Date(b.date + "T" + (b.time||"00:00")).getTime();
    const aF = da >= now, bF = db >= now;
    if (aF && !bF) return -1;
    if (!aF && bF) return 1;
    return aF ? da - db : db - da;
  });

  grid.innerHTML = "";
  if (list.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">No events yet</div><p>Be the first to post something for the community.</p></div>`;
    return;
  }

  list.forEach(ev => {
    const cats = Array.isArray(ev.categories) ? ev.categories : [ev.category].filter(Boolean);
    const catObjs = cats.map(id => CATEGORIES.find(c => c.id === id)).filter(Boolean);
    const gone = localStorage.getItem("db-going-" + ev.id);

    const catTags = catObjs.map(c => `<span class="event-cat-tag">${c.emoji} ${c.label}</span>`).join("");
    const roomBadge = ev.room ? `<span class="room-badge">🏠 ${esc(ev.room)}</span>` : "";

    const card = document.createElement("div");
    card.className = "event-card";
    card.innerHTML = `
      <div class="event-card-top">
        <div class="event-title">${esc(ev.title)}</div>
        <div class="event-cats">${catTags}</div>
      </div>
      <div class="event-card-body">
        <div class="event-meta">
          <div class="event-meta-item"><span>📅</span>${esc(fmtDate(ev.date, ev.time))}</div>
          ${ev.format === "virtual" || ev.format === "both" ? `<div class="event-meta-item"><span>💻</span>Virtual</div>` : ""}
          ${ev.format === "inperson" || ev.format === "both" ? `<div class="event-meta-item"><span>📍</span>${ev.location ? esc(ev.location) : "In-person"}</div>` : ""}
          ${!ev.format && ev.location ? `<div class="event-meta-item"><span>📍</span>${esc(ev.location)}</div>` : ""}
          <div class="event-meta-item"><span>👤</span>Hosted by ${esc(ev.host)}</div>
        </div>
        ${ev.description ? `<div class="event-desc">${esc(trunc(ev.description, 110))}</div>` : ""}
      </div>
      <div class="event-card-footer">
        <div class="going-count"><span id="going-${ev.id}">${ev.going||0}</span> interested</div>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
          <button class="btn btn-sm ${gone?"btn-outline":""}" id="goin-btn-${ev.id}"
            onclick="markGoing('${ev.id}')">
            ${gone ? "✓ You're in" : "🙋 I'm in"}
          </button>
          ${roomBadge}
          <button class="btn btn-sm btn-outline" onclick="openEdit('${ev.id}')" title="Edit event" style="padding:8px 10px;">✏️</button>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function markGoing(id) {
  const key = "db-going-" + id;
  const ev = events.find(e => e.id === id);
  if (!ev) return;
  const already = localStorage.getItem(key);
  if (already) {
    ev.going = Math.max((ev.going || 1) - 1, 0);
    localStorage.removeItem(key);
  } else {
    ev.going = (ev.going || 0) + 1;
    localStorage.setItem(key, "1");
  }
  saveEvents();
  const nowGone = !!localStorage.getItem(key);
  const countEl = document.getElementById("going-" + id);
  const btn = document.getElementById("goin-btn-" + id);
  if (countEl) countEl.textContent = ev.going;
  if (btn) {
    btn.textContent = nowGone ? "✓ You're in" : "🙋 I'm in";
    btn.className = "btn btn-sm" + (nowGone ? " btn-outline" : "");
  }
  showToast(nowGone ? "Marked as interested!" : "Removed - no problem!");
}

// ── Modal ─────────────────────────────────────
function openModal() {
  editingId = null;
  selectedCats = new Set();
  selectedRoom = null;
  selectedFormat = null;
  ["virtual","inperson","both"].forEach(f => document.getElementById("fmt-"+f).classList.remove("selected"));
  document.getElementById("location-field").style.display = "none";
  document.getElementById("post-modal").classList.add("open");
  document.getElementById("post-error").style.display = "none";
  document.getElementById("room-preview").style.display = "none";
  document.getElementById("f-date").min = new Date().toISOString().split("T")[0];
  document.getElementById("modal-title").textContent = "Post an event";
  document.getElementById("submit-btn").textContent = "Post event";
  ["f-title","f-date","f-time","f-location","f-desc","f-host"].forEach(id => document.getElementById(id).value = "");
  buildFormChips();
}

function openEdit(id) {
  const ev = events.find(e => e.id === id);
  if (!ev) return;
  editingId = id;
  selectedCats = new Set(Array.isArray(ev.categories) ? ev.categories : [ev.category].filter(Boolean));
  selectedRoom = ev.room || null;
  selectedFormat = ev.format || null;

  document.getElementById("post-modal").classList.add("open");
  document.getElementById("post-error").style.display = "none";
  document.getElementById("modal-title").textContent = "Edit event";
  document.getElementById("submit-btn").textContent = "Save changes";
  document.getElementById("f-title").value = ev.title || "";
  document.getElementById("f-date").value = ev.date || "";
  document.getElementById("f-time").value = ev.time || "";
  document.getElementById("f-location").value = ev.location || "";
  document.getElementById("f-desc").value = ev.description || "";
  document.getElementById("f-host").value = ev.host || "";

  // Restore format chips
  ["virtual","inperson","both"].forEach(f => {
    document.getElementById("fmt-"+f).classList.toggle("selected", f === selectedFormat);
  });
  const showLoc = selectedFormat === "inperson" || selectedFormat === "both";
  document.getElementById("location-field").style.display = showLoc ? "block" : "none";

  buildFormChips();
  updateRoomPreview();
}
function closeModal() { document.getElementById("post-modal").classList.remove("open"); }
document.getElementById("post-modal").addEventListener("click", e => { if (e.target.id === "post-modal") closeModal(); });

function submitEvent() {
  const title    = document.getElementById("f-title").value.trim();
  const date     = document.getElementById("f-date").value;
  const time     = document.getElementById("f-time").value;
  const location = document.getElementById("f-location").value.trim();
  const desc     = document.getElementById("f-desc").value.trim();
  const host     = document.getElementById("f-host").value.trim();
  const errEl    = document.getElementById("post-error");

  if (!title || selectedCats.size === 0 || !date || !host || !selectedFormat) {
    errEl.textContent = "Please fill in a title, at least one category, format, date, and host name.";
    errEl.style.display = "block";
    return;
  }
  if ((selectedFormat === "virtual" || selectedFormat === "both") && !selectedRoom) {
    errEl.textContent = "Please select which room is best for this event.";
    errEl.style.display = "block";
    return;
  }
  errEl.style.display = "none";

  const catIds = Array.from(selectedCats);
  const eventData = {
    title, categories: catIds, date, time,
    format: selectedFormat,
    location: (selectedFormat === "inperson" || selectedFormat === "both") ? location : null,
    description: desc, host,
    room: (selectedFormat === "virtual" || selectedFormat === "both") ? selectedRoom : null,
  };

  if (editingId) {
    const idx = events.findIndex(e => e.id === editingId);
    if (idx > -1) events[idx] = { ...events[idx], ...eventData };
    showToast("✓ Event updated!");
  } else {
    events.unshift({ id: Date.now().toString(36) + Math.random().toString(36).slice(2,6), ...eventData, going: 0 });
    showToast("✓ Event posted!");
  }
  saveEvents();
  closeModal();
  ["f-title","f-date","f-time","f-location","f-desc","f-host"].forEach(id => document.getElementById(id).value = "");
  renderEvents();
}

// ── Helpers ───────────────────────────────────
function fmtDate(date, time) {
  if (!date) return "Date TBD";
  const d = new Date(date + "T" + (time||"00:00"));
  const ds = d.toLocaleDateString("en-US", { weekday:"short", month:"short", day:"numeric" });
  return time ? ds + " · " + d.toLocaleTimeString("en-US", { hour:"numeric", minute:"2-digit" }) : ds;
}
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function trunc(s, n) { return s.length > n ? s.slice(0,n) + "…" : s; }
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

loadEvents().then(() => { renderPills(); renderEvents(); });
</script>
