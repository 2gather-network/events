<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DayBalancer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Verdana, Geneva, sans-serif; background: transparent; padding: 8px; }
  .widget { background: rgba(0,0,0,0.35); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); border-radius: 12px; padding: 10px; width: 160px; box-shadow: 0 4px 16px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.2); }
  .header { margin-bottom: 8px; padding-bottom: 7px; border-bottom: 1px solid rgba(255,255,255,0.3); }
  .brand { font-size: 12px; font-weight: 700; color: #ffffff; line-height: 1.2; text-shadow: 0 1px 3px rgba(0,0,0,0.6); }
  .tagline { font-size: 8px; color: rgba(255,255,255,0.9); letter-spacing: 1px; text-transform: uppercase; }
  .buttons { display: flex; flex-direction: column; gap: 5px; }
  .btn { display: flex; align-items: center; gap: 7px; text-decoration: none; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); border-radius: 7px; padding: 6px 8px; transition: all 0.2s ease; }
  .btn:hover { background: rgba(255,255,255,0.3); border-color: rgba(255,255,255,0.5); }
  .btn svg { width: 14px; height: 14px; stroke: #ffffff; flex-shrink: 0; fill: none; stroke-width: 2.5; }
  .btn-label { font-size: 11px; font-weight: 700; color: #ffffff; text-shadow: 0 1px 3px rgba(0,0,0,0.6); }
</style>
</head>
<body>
<div class="widget">
  <div class="header">
    <div class="brand">Regenerative</div>
    <div class="tagline">network</div>
  </div>
  <div class="buttons">
    <a class="btn" href="https://app.daybalancer.com/dl/events" target="_blank">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
      <span class="btn-label">Events</span>
    </a>
    <a class="btn" href="https://app.daybalancer.com/dl/findatime" target="_blank">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>
      <span class="btn-label">Find a Time</span>
    </a>
  </div>
</div>
</body>
</html>
