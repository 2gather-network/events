function getNextDate(dayOfWeek) {
  const now = new Date();
  const d = new Date(now);
  d.setHours(0,0,0,0);
  const diff = (dayOfWeek - d.getDay() + 7) % 7 || 7;
  d.setDate(d.getDate() + diff);
  return d.toISOString().slice(0,10);
}

function recurToEv(r) {
  return {
    id: r.id, title: r.title||"",
    date: getNextDate(r.dayOfWeek),
    time: r.time||"", endtime: r.endtime||"",
    format: r.format||"", location: r.location||"",
    room: r.room||"", description: r.description||"",

  };
}

const GS_URL = "https://script.google.com/macros/s/AKfycbzEavMnG4tMeWemoT5FLu9f_zjlKVIJsZLueG4nhw9akK0_nZqpbkZiXrAlWu1Fyhq9/exec";

function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function jsonp(params) {
  return new Promise((resolve, reject) => {
    const cb = "cb_" + Date.now() + "_" + Math.random().toString(36).slice(2);
    let done = false;
    const finish = (fn) => { if (done) return; done = true; delete window[cb]; try { el.remove(); } catch(e){} fn(); };
    const t = setTimeout(() => finish(() => reject(new Error("timeout"))), 20000);
    window[cb] = (d) => { clearTimeout(t); finish(() => resolve(d)); };
    const qs = Object.entries(params).map(([k,v]) => encodeURIComponent(k)+"="+encodeURIComponent(v)).join("&");
    const el = document.createElement("script");
    el.src = GS_URL + "?" + qs + "&callback=" + cb;
    el.onerror = () => finish(() => reject(new Error("error")));
    document.head.appendChild(el);
  });
}

function parseDate(v) {
  if (!v) return "";
  const s = String(v).trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  if (s.includes("T")) return s.split("T")[0];
  const m = s.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m) return m[3]+"-"+m[1].padStart(2,"0")+"-"+m[2].padStart(2,"0");
  return s;
}

function parseTime(v) {
  if (!v) return "";
  const m = String(v).trim().match(/(\d{1,2}):(\d{2})\s*(AM|PM)?/i);
  if (!m) return "";
  let h = parseInt(m[1]); const mn = m[2], ap = (m[3]||"").toUpperCase();
  if (ap==="PM" && h<12) h+=12;
  if (ap==="AM" && h===12) h=0;
  return String(h).padStart(2,"0")+":"+mn;
}

function fmtDate(date, time, endtime) {
  if (!date) return "";
  const d = new Date(date+"T"+(time||"00:00"));
  let s = d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
  if (time) {
    s += " · " + new Date(date+"T"+time).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
    if (endtime) s += " - " + new Date(date+"T"+endtime).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
    try { const tzAbbr = new Date(date+"T"+time).toLocaleTimeString("en-US",{timeZoneName:"short"}).split(" ").pop(); s += " " + tzAbbr; } catch(e){}
  }
  return s;
}

function toEv(r) {
  return {

    host_note: r.host_note||"",

function render(ev) {

  const eventDay = ev.date ? new Date(ev.date + "T00:00:00") : null;
  const isPast = eventDay && eventDay < today;

  const fmtBadge = ev.format==="virtual" ? `<span class="format-badge badge-virtual">💻 Virtual</span>`

  const roomUrl = ROOMS[ev.room] || "https://events.2gather.network/events/yvrgej/zkxbzq";
  const roomEmoji = ROOM_EMOJI[ev.room] || "🏠";
  const isToday = eventDay && eventDay.toDateString() === today.toDateString();
  const joinBtn = (ev.format === "virtual" || ev.format === "both") && isToday

    ? `<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(ev.location)}" target="_blank" rel="noopener">${esc(ev.location)}</a>`
    : "In-person";

  const hostHtml = ev.hostlink ? `<a href="${esc(ev.hostlink)}" target="_blank" rel="noopener">${esc(ev.host)}</a>` : esc(ev.host);
  const firstName = (ev.host||"").trim().split(/\s+/)[0]||"Host";

  const sl = ev.showLinks||"";
  const lines = [
    ev.date ? `<div class="meta-item"><span>🗓️</span><span>${esc(fmtDate(ev.date,ev.time,ev.endtime))}</span></div>` : "",

let _currentEv = null; // store rendered event for calendar lookup

function addToCalendarById(id) {
  if (_currentEv && _currentEv.id === id) addToCalendar(_currentEv);
}

function addToCalendar(ev) {
  if (!ev.date) return;
  const pad = n => String(n).padStart(2,"0");
  const toGCal = (d,t) => { const dt = new Date(d+"T"+(t||"00:00")); return dt.getFullYear()+pad(dt.getMonth()+1)+pad(dt.getDate())+"T"+pad(dt.getHours())+pad(dt.getMinutes())+"00"; };
  const start = toGCal(ev.date, ev.time);
  const end   = ev.endtime ? toGCal(ev.date, ev.endtime) : toGCal(ev.date, ev.time);
  const loc   = ev.location || ev.meetinglink || "";
  const params = new URLSearchParams({
    text: ev.title,
    dates: start + "/" + end,
    details: (ev.description||"").slice(0,500),
    location: loc,
  });
  if (ev.recurFreq === "weekly") {
    const day = ["SU","MO","TU","WE","TH","FR","SA"][new Date(ev.date+"T12:00").getDay()];
    params.append("recur", "RRULE:FREQ=WEEKLY;BYDAY="+day);
  } else if (ev.recurFreq === "monthly") {
    params.append("recur", "RRULE:FREQ=MONTHLY");
  }
  window.open("https://calendar.google.com/calendar/r/eventedit?" + params.toString(), "_blank");
}

function copyLink() {
  const url = window.location.href;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById("copy-btn");
    if (btn) { const orig = btn.textContent; btn.textContent = "✓ Copied!"; setTimeout(() => btn.textContent = orig, 2000); }
  }).catch(() => prompt("Copy this link:", url));
}

function share() {
  const url = window.location.href;

  const showCopyUI = () => {
    const existing = document.getElementById("share-url-box");
    if (existing) { existing.remove(); return; }
    const box = document.createElement("div");
    box.id = "share-url-box";
    box.style.cssText = "position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:14px 16px;box-shadow:0 4px 24px rgba(0,0,0,.18);z-index:9999;width:min(340px,92vw);";
    box.innerHTML = `<p style="font-size:12px;color:var(--muted);margin:0 0 8px;">Copy this link to share:</p><div style="display:flex;gap:8px;"><input id="share-url-input" value="${url}" readonly style="flex:1;border:1.5px solid var(--border);border-radius:6px;padding:7px 10px;font-size:12px;color:var(--dark);min-width:0;"><button id="share-copy-btn" onclick="(()=>{const i=document.getElementById('share-url-input');i.select();navigator.clipboard?.writeText(i.value).catch(()=>{});document.getElementById('share-copy-btn').textContent='✓';setTimeout(()=>document.getElementById('share-url-box')?.remove(),1200);})()" style="background:var(--primary);color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0;">Copy</button></div>`;
    document.body.appendChild(box);
    setTimeout(() => { const i = document.getElementById("share-url-input"); i?.select(); }, 60);
    setTimeout(() => box.remove(), 8000);
  };

  const copyFallback = () => {
    navigator.clipboard?.writeText(url)
      .then(() => showToast("🔗 Link copied!"))
      .catch(() => showCopyUI());
  };

  if (navigator.share) {
    navigator.share({ title: document.title, url })
      .catch(err => { if (err.name !== "AbortError") copyFallback(); });
  } else {
    copyFallback();
  }
}

async function submitInterestInline() {
  if (!_currentEv) return;
  const name = (document.getElementById("int-name-inline")?.value || "").trim();
  const required = _currentEv.interestedEnabled === "required";
  const errEl = document.getElementById("int-inline-error");
  if (required && !name) {
    if (errEl) { errEl.textContent = "Please enter your name to register."; errEl.style.display = "block"; }
    return;
  }
  const form = document.getElementById("interest-form");
  if (form) form.style.display = "none";
  const confirmed = document.getElementById("interest-confirmed");
  if (confirmed) confirmed.style.display = "block";
  const notes = document.getElementById("notes-section");
  if (notes) notes.style.display = "block";
  const hostNoteSection = document.getElementById("host-note-section");
  if (hostNoteSection) hostNoteSection.style.display = "block";
  const btn = document.getElementById("interest-btn");
  if (btn) { btn.textContent = "✓ Interested"; btn.disabled = true; btn.style.opacity = "0.7"; }
  try { localStorage.setItem("db-interested-" + _currentEv.id, "1"); } catch(e) {}
  const modeLabel = _attendanceMode === "online" ? "💻 Online" : _attendanceMode === "inperson" ? "📍 In-person" : "";
  const entry = [name, modeLabel].filter(Boolean).join(" · ") || "Anonymous";
  _attendanceMode = "";
  // If this is a recurring event, auto-create a sheet row first so interest saves correctly
  if (_currentEv.id && _currentEv.id.startsWith("recurring-")) {
    const stableId = "rec-" + (_currentEv.title||"").toLowerCase().replace(/\s+/g,"-").replace(/[^a-z0-9-]/g,"");
    try {
      await jsonp({
        action: "add",
        event: JSON.stringify({
          id: stableId, title: _currentEv.title||"", categories: Array.isArray(_currentEv.categories)?_currentEv.categories.join(","):"",
          date: _currentEv.date||"", startTime: _currentEv.time||"", endTime: _currentEv.endtime||"",
          format: _currentEv.format||"", location: _currentEv.location||"", room: _currentEv.room||"",
          description: _currentEv.description||"", host: _currentEv.host||"", hostlink: _currentEv.hostlink||"",
          contactEmail: _currentEv.contactEmail||"", contactPhone: _currentEv.contactPhone||"",
          passcode: "6090", going: 0, recurFreq: _currentEv.recurFreq||"weekly",
          interestedEnabled: _currentEv.interestedEnabled||"optional",
          sharedNotesEnabled: _currentEv.sharedNotesEnabled||false,
          interested: entry,
        })
      });
      // Now save interest to the stable ID row
      return;
    } catch(e) { console.warn("Auto-create recurring row failed", e); }
  }
  try { await jsonp({ action:"interest", id:_currentEv.id, entry }); } catch(e) { console.warn("Interest save failed", e); }

async function init() {
  const inIframe = window.self !== window.top;
  // hide back link when in iframe - the modal provides navigation
  if (inIframe) {
    const backBar = document.querySelector('body > div:first-child');
    if (backBar) backBar.style.display = "none";
  }
  const id = new URLSearchParams(window.location.search).get("id");
  if (!id) { render(PREVIEW_EVENT); return; }
  // Check recurring events (IDs are dynamic: recurring-{slug}-{YYYY-MM-DD})
  if (id.startsWith("recurring-")) {
    const dateStr = id.slice(-10); // last 10 chars = YYYY-MM-DD
    const slug    = id.slice("recurring-".length, id.length - 11); // between prefix and date
    // Match using same slug logic as events.html: title.toLowerCase().replace(/\s+/g,"-")
    const recurMatch = RECURRING_EVENTS.find(r =>
      r.title.toLowerCase().replace(/\s+/g, "-") === slug
    );
    if (recurMatch) {
      try {
        const ev = recurToEv(recurMatch);
        ev.date = dateStr;
        // v4.17: check sheet for occurrence-specific note
        try {
          const sheetData = await jsonp({ t: Date.now() });
          const noteRow = (sheetData.events||[]).filter(r=>r.id).map(toEv).find(e => e.id === "occ-note-" + id);
          if (noteRow && dateStr) {
            const _today = new Date(); _today.setHours(0,0,0,0);
            const _evDay = new Date(dateStr + "T00:00:00");
            if (_evDay >= _today) ev.occurrenceNote = noteRow.description;
          }
        } catch(e2) { /* no note available */ }
        render(ev);
      } catch(e) {
        showError("Render error: " + e.message);
        console.error(e);
      }
      return;
    }
  }

  try {
    const data = await jsonp({ t: Date.now() });
    const ev = (data.events||[]).filter(r=>r.id).map(toEv).find(e=>e.id===id);
    if (!ev) { showError("Event not found."); return; }
    render(ev);
  } catch(e) {
    showError("Could not load event. Please try again.");
  }
}
