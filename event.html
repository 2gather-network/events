<!DOCTYPE html>
<html lang="en">
<head>
  <!--
  event.html
  Version 1.5
  v1.3 - Fixed recurring event ID parsing (dynamic slugs with date suffix)
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1b6896;
      --dark: #1a1a2e;
      --muted: #6b7280;
      --border: #e5e7eb;
      --bg: #f5f6fa;
      --card-bg: #ffffff;
      --radius: 14px;
    }
    body {
      font-family: 'Nunito Sans','Segoe UI',sans-serif;
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 16px 64px;
    }
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      width: 100%;
      max-width: 560px;
      overflow: hidden;
    }
    .cover-img { width: 100%; height: 220px; object-fit: cover; display: block; }
    .card-body { padding: 24px 24px 28px; }
    .top-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .format-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 600; padding: 4px 10px;
      border-radius: 20px; letter-spacing: 0.03em; white-space: nowrap;
    }
    .badge-virtual  { background: #EFF6FF; color: #1d4ed8; }
    .badge-inperson { background: #F0FDF4; color: #166534; }
    .badge-hybrid   { background: #FFF7ED; color: #9a3412; }
    .badge-recurring { background: #E8F2F9; color: var(--primary); }
    h1 { font-size: 22px; font-weight: 700; line-height: 1.3; margin-bottom: 18px; }
    .meta { display: flex; flex-direction: column; gap: 9px; margin-bottom: 18px; }
    .meta-item { display: flex; align-items: flex-start; gap: 8px; font-size: 14px; line-height: 1.5; }
    .meta-item span { flex-shrink: 0; }
    .meta-item a { color: var(--primary); text-decoration: none; font-weight: 600; }
    .contributions {
      font-size: 13px; color: var(--muted);
      margin-bottom: 18px; padding: 10px 14px;
      background: #f9fafb; border-radius: 8px; border: 1px solid var(--border);
    }
    .detail-img { width: 100%; border-radius: 10px; margin-bottom: 16px; display: block; max-height: 300px; object-fit: cover; }
    .description { font-size: 15px; color: #374151; line-height: 1.7; margin-bottom: 24px; white-space: pre-wrap; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; border: 1.5px solid transparent; text-decoration: none; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn-outline { background: transparent; border-color: var(--border); color: var(--dark); }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--muted); text-decoration: none; padding: 16px 24px 0;
    }
    .back-link:hover { color: var(--primary); }
    .past-banner {
      background: #f0f0f0; color: #666; font-size: 11px; font-weight: 700;
      letter-spacing: 0.07em; padding: 5px 18px; border-bottom: 1px solid var(--border);
    }
    .loading, .error { text-align: center; padding: 60px 24px; color: var(--muted); font-size: 15px; }
  </style>
</head>
<body>
<div class="card" id="card">
  <div class="loading">Loading event...</div>
</div>
<script>

const ROOMS = {
  "DayBalancer Onboarding": "https://gather.daybalancer.com/events/yvrgej/zkxbzq",
  "The Commons":            "https://gather.daybalancer.com/events/yvrgej/zkxbzq",
  "Ikigai room":            "https://gather.daybalancer.com/events/eojvkq/qwmpgq",
  "Wellness room":          "https://gather.daybalancer.com/events/336936/504368",
  "Community Care room":    "https://gather.daybalancer.com/events/yvrgej/gypxbp",
  "Co-Create room":         "https://gather.daybalancer.com/events/yvrgej/rwbplq",
  "Coworking room":         "https://gather.daybalancer.com/events/yvrgej/gpbqox",
};

const RECURRING_EVENTS = [
  { id:"onboarding-001", title:"DayBalancer Onboarding", dayOfWeek:1, time:"12:00", endtime:"13:00", format:"virtual", room:"DayBalancer Onboarding", host:"DayBalancer", hostlink:"", categories:["learning"], description:"New to DayBalancer? Join us every Monday for a live onboarding session. We'll walk you through the platform, answer your questions, and help you get connected to the community.", experience:"connected,energized", recurFreq:"weekly" },
  { id:"ikigai-001", title:"Ikigai Tuesdays", dayOfWeek:2, time:"12:00", endtime:"13:00", format:"virtual", room:"Ikigai room", host:"Jessie Upp", hostlink:"https://appear.network/dl/page/s/e13594/r/w.hssQR.Q7CnpNDnVJ6DwQ", categories:["learning"], description:"A weekly pause to reconnect with what matters. We explore together where your joy, your strengths, and what's needed in the world actually meet.", experience:"connected,expressed,rested", recurFreq:"weekly" },
  { id:"wellness-001", title:"Wellness Wednesdays", dayOfWeek:3, time:"12:00", endtime:"13:00", format:"virtual", room:"Wellness room", host:"Jessie Upp", hostlink:"https://appear.network/dl/page/s/e13594/r/w.hssQR.Q7CnpNDnVJ6DwQ", categories:["care"], description:"Come join our wellness room to discuss anything wellness. Weekly on Wednesdays.", experience:"rested,energized", imageUrl:"https://drive.google.com/uc?export=view&id=1qQlQYosaLI47pV2scZD6K_boxYk9XV3C", recurFreq:"weekly" },
  { id:"feedback-001", title:"Feedback Fridays", dayOfWeek:5, time:"10:30", endtime:"10:45", format:"virtual", room:"Co-Create room", host:"Jessie Upp", hostlink:"https://appear.network/dl/page/s/e13594/r/w.hssQR.Q7CnpNDnVJ6DwQ", categories:["learning"], description:"Bring an idea - small or big. Connect with others in the room and break into another room - or schedule time for later for feedback.", experience:"connected,expressed,energized", imageUrl:"https://drive.google.com/uc?export=view&id=1Vs2GpvmFdSOrdLYs2hy8lO06SNyYxm_c", recurFreq:"weekly" },
  { id:"kickoff-001", title:"Kick off Mondays for indies", dayOfWeek:1, time:"09:00", endtime:"10:00", format:"virtual", room:"The Commons", host:"Jessie Upp", hostlink:"https://appear.network/dl/page/s/e13594/r/w.hssQR.Q7CnpNDnVJ6DwQ", categories:["learning"], description:"Start your week with other independents. Share what you're working on, what you need, and what you're offering. Stay for open coworking.", experience:"connected,energized", imageUrl:"https://drive.google.com/uc?export=view&id=1QdQ2gA3bTSsrfrIYjf2D7ZqUyHuXBjbM", recurFreq:"weekly" },
  { id:"getstarted-001", title:"Get started with Appear Network", dayOfWeek:1, time:"12:00", endtime:"12:30", format:"virtual", room:"The Commons", host:"Jessie Upp", hostlink:"https://appear.network/dl/page/s/e13594/r/w.hssQR.Q7CnpNDnVJ6DwQ", categories:["learning"], description:"Join us every Monday for a live Q&A session. We'll walk you through the platform and help you get connected to community.", experience:"connected,energized", imageUrl:"https://drive.google.com/uc?export=view&id=1QdQ2gA3bTSsrfrIYjf2D7ZqUyHuXBjbM", recurFreq:"weekly" },
  { id:"shinelight-001", title:"Shine your light! ⭐️", dayOfWeek:2, time:"13:00", endtime:"15:00", format:"inperson", location:"23000 Lakeview Dr, Mountlake Terrace, WA 98043", host:"Jessie Upp", hostlink:"https://appear.network/dl/page/s/e13594/r/w.hssQR.Q7CnpNDnVJ6DwQ", contactEmail:"hello@daybalancer.com", contactPhone:"601-348-7751", categories:["learning"], description:"A weekly pause to reconnect with what matters. We explore your gifts, what brings you joy, and what's needed - for yourself and your community. Come join us right off the MLT light rail. Arrive early for $5 lunch at noon, or arrive at 1:00 for circle dialogue. Stay after for networking, ping pong, or a walk to the lake. Need to join virtually? Request to join us in the virtual DayBalancer Commons from 1:00-2:00 PM PST.", exchangeType:"free,feedback,noask,money", showLinks:"hostlink,paymentlink,contact", experience:"connected,expressed,nourished,playful", imageUrl:"https://drive.google.com/uc?export=view&id=1oZbvH8JJktR8h5m--5tQkjiZUrHgOuQh", recurFreq:"weekly" },
];

function getNextDate(dayOfWeek) {
  const now = new Date();
  const d = new Date(now);
  d.setHours(0,0,0,0);
  const diff = (dayOfWeek - d.getDay() + 7) % 7 || 7;
  d.setDate(d.getDate() + diff);
  return d.toISOString().slice(0,10);
}

function recurToEv(r) {
  return {
    id: r.id, title: r.title||"",
    date: getNextDate(r.dayOfWeek),
    time: r.time||"", endtime: r.endtime||"",
    format: r.format||"", location: r.location||"",
    room: r.room||"", description: r.description||"",
    host: r.host||"", hostlink: r.hostlink||"",
    contactEmail: r.contactEmail||"", contactPhone: r.contactPhone||"",
    cooplink: r.cooplink||"", paymentlink: r.paymentlink||"",
    meetinglink: ROOMS[r.room] || "", showLinks: r.showLinks||"",
    otherExchange: r.otherExchange||"", exchangeType: r.exchangeType||"",
    recurFreq: r.recurFreq||"weekly", experience: r.experience||"",
    imageUrl: r.imageUrl||"", detailImageUrl: r.detailImageUrl||"", lifeStage: r.lifeStage||"", keywords: r.keywords||"",
  };
}

const GS_URL = "https://script.google.com/macros/s/AKfycbzEavMnG4tMeWemoT5FLu9f_zjlKVIJsZLueG4nhw9akK0_nZqpbkZiXrAlWu1Fyhq9/exec";

function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function jsonp(params) {
  return new Promise((resolve, reject) => {
    const cb = "cb_" + Date.now() + "_" + Math.random().toString(36).slice(2);
    let done = false;
    const finish = (fn) => { if (done) return; done = true; delete window[cb]; try { el.remove(); } catch(e){} fn(); };
    const t = setTimeout(() => finish(() => reject(new Error("timeout"))), 20000);
    window[cb] = (d) => { clearTimeout(t); finish(() => resolve(d)); };
    const qs = Object.entries(params).map(([k,v]) => encodeURIComponent(k)+"="+encodeURIComponent(v)).join("&");
    const el = document.createElement("script");
    el.src = GS_URL + "?" + qs + "&callback=" + cb;
    el.onerror = () => finish(() => reject(new Error("error")));
    document.head.appendChild(el);
  });
}

function parseDate(v) {
  if (!v) return "";
  const m = String(v).trim().match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m) return m[3]+"-"+m[1].padStart(2,"0")+"-"+m[2].padStart(2,"0");
  return String(v).trim();
}

function parseTime(v) {
  if (!v) return "";
  const m = String(v).trim().match(/(\d{1,2}):(\d{2})\s*(AM|PM)?/i);
  if (!m) return "";
  let h = parseInt(m[1]); const mn = m[2], ap = (m[3]||"").toUpperCase();
  if (ap==="PM" && h<12) h+=12;
  if (ap==="AM" && h===12) h=0;
  return String(h).padStart(2,"0")+":"+mn;
}

function fmtDate(date, time, endtime) {
  if (!date) return "";
  const d = new Date(date+"T"+(time||"00:00"));
  let s = d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
  if (time) {
    s += " · " + new Date(date+"T"+time).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
    if (endtime) s += " - " + new Date(date+"T"+endtime).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
    try { const tzAbbr = new Date(date+"T"+time).toLocaleTimeString("en-US",{timeZoneName:"short"}).split(" ").pop(); s += " " + tzAbbr; } catch(e){}
  }
  return s;
}

function toEv(r) {
  return {
    id: String(r.id||""), title: r.title||"",
    date: parseDate(r.date), time: parseTime(r.startTime), endtime: parseTime(r.endTime),
    format: r.format||"", location: r.location||"", room: r.room||"",
    description: r.description||"", host: r.host||"", hostlink: r.hostlink||"",
    contactEmail: r.contactEmail||"", contactPhone: r.contactPhone||"",
    cooplink: r.cooplink||"", paymentlink: r.paymentlink||"", meetinglink: r.meetinglink||"",
    showLinks: r.showLinks||"", otherExchange: r.otherExchange||"",
    exchangeType: r.exchangeType||"", recurFreq: r.recurFreq||"",
    experience: r.experience||"", imageUrl: r.imageUrl||"", detailImageUrl: r.detailImageUrl||"", lifeStage: r.lifeStage||"", keywords: r.keywords||"",
  };
}

function render(ev) {
  const isPast = ev.date && (ev.endtime
    ? new Date(ev.date+"T"+ev.endtime)<Date.now()
    : new Date(ev.date+"T"+(ev.time||"00:00")).getTime()+3600000<Date.now());

  const expMap = {connected:"🌐 Connected",expressed:"🎨 Expressed",nourished:"🥘 Nourished from food/drink",energized:"🌀 Energized",playful:"🏓 Playful",rested:"💙 Rested"};
  const typeMap = {spread:"📣 Spread the word",time:"⏰ Time",connections:"🌐 Referrals/Connections",feedback:"💬 Feedback",skills:"🛠️ Skills",stuff:"🎁 Stuff",space:"📍 Space",money:"💵 Money",care:"💛 Care",noask:"📣 Spread the word",free:"💬 Feedback",testimonial:"⏰ Time",share:"💵 Money"};

  const fmtBadge = ev.format==="virtual" ? `<span class="format-badge badge-virtual">💻 Virtual</span>`
    : ev.format==="inperson" ? `<span class="format-badge badge-inperson">📍 In-person</span>`
    : ev.format==="both" ? `<span class="format-badge badge-hybrid">🔀 Hybrid</span>` : "";

  const recurBadge = ev.recurFreq ? `<span class="format-badge badge-recurring">🔁 ${ev.recurFreq==="monthly"?"Monthly":"Weekly"}</span>` : "";

  const roomUrl = "https://gather.daybalancer.com/events/yvrgej/zkxbzq";
  const vLink = ev.meetinglink ? `<a href="${esc(ev.meetinglink)}" target="_blank" rel="noopener">Join virtual meeting</a>`
    : ev.room ? `<a href="${esc(roomUrl)}" target="_blank" rel="noopener">${esc(ev.room)}</a>` : "Virtual";

  const locLink = ev.location
    ? `<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(ev.location)}" target="_blank" rel="noopener">${esc(ev.location)}</a>`
    : "In-person";

  const hostHtml = ev.hostlink ? `<a href="${esc(ev.hostlink)}" target="_blank" rel="noopener">${esc(ev.host)}</a>` : esc(ev.host);
  const firstName = (ev.host||"").trim().split(/\s+/)[0]||"Host";

  const sl = ev.showLinks||"";
  const lines = [
    ev.date ? `<div class="meta-item"><span>🗓️</span><span>${esc(fmtDate(ev.date,ev.time,ev.endtime))}</span></div>` : "",
    ev.experience ? `<div class="meta-item"><span>✨</span><span><strong>Experience:</strong> ${ev.experience.split(",").filter(Boolean).map(t=>expMap[t]||t).join(" · ")}</span></div>` : "",
    (ev.format==="virtual"||ev.format==="both") ? `<div class="meta-item"><span>💻</span>${vLink}</div>` : "",
    (ev.format==="inperson"||ev.format==="both") ? `<div class="meta-item"><span>📍</span>${locLink}</div>` : "",
    (!ev.format&&ev.location) ? `<div class="meta-item"><span>📍</span>${locLink}</div>` : "",
    ev.host ? `<div class="meta-item"><span>👤</span><span>Hosted by ${hostHtml}</span></div>` : "",
    (ev.paymentlink&&sl.includes("paymentlink")) ? `<div class="meta-item"><span>💳</span><a href="${esc(ev.paymentlink)}" target="_blank" rel="noopener">Register / Pay</a></div>` : "",
    (ev.cooplink&&sl.includes("cooplink")) ? `<div class="meta-item"><span>🔗</span><a href="${esc(ev.cooplink)}" target="_blank" rel="noopener">Group link</a></div>` : "",
    (ev.contactEmail&&sl.includes("contact")) ? `<div class="meta-item"><span>✉️</span><a href="mailto:${esc(ev.contactEmail)}">${esc(ev.contactEmail)}</a></div>` : "",
    (ev.contactPhone&&sl.includes("contact")) ? `<div class="meta-item"><span>📞</span><span>${esc(ev.contactPhone)}</span></div>` : "",
  ].filter(Boolean).join("");

  const exchange = ev.exchangeType
    ? `<div class="contributions">What ${esc(firstName)} welcomes: ${ev.exchangeType.split(",").filter(Boolean).map(t=>typeMap[t]||(t==="other"?"✏️ "+(ev.otherExchange||"Other"):t)).join(" · ")}</div>` : "";

  document.getElementById("card").innerHTML = `
    <a class="back-link" href="calendar.html">← All events</a>
    ${ev.imageUrl ? `<img class="cover-img" src="${esc(ev.imageUrl)}" alt="" onerror="this.style.display='none'">` : ""}
    ${isPast ? `<div class="past-banner">PAST EVENT</div>` : ""}
    <div class="card-body">
      <div class="top-row">${fmtBadge}${recurBadge}</div>
      <h1>${esc(ev.title)}</h1>
      <div class="meta">${lines}</div>
      ${exchange}
      ${ev.detailImageUrl ? `<img class="detail-img" src="${esc(ev.detailImageUrl)}" alt="" onerror="this.style.display='none'">` : ""}
      ${ev.description ? `<p class="description">${esc(ev.description)}</p>` : ""}
      <hr class="divider">
      <div class="actions">
        <button class="btn btn-primary" onclick="share()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px;"><polyline points="8 17 12 21 16 17"/><line x1="12" y1="3" x2="12" y2="21"/><polyline points="20 7 12 3 4 7"/></svg> Share</button>
        <a class="btn btn-outline" href="calendar.html">← All events</a>
      </div>
    </div>`;

  document.title = ev.title || "Event";
}


function addToCalendar(ev) {
  if (!ev.date) return;
  const pad = n => String(n).padStart(2,"0");
  const toGCal = (d,t) => { const dt = new Date(d+"T"+(t||"00:00")); return dt.getFullYear()+pad(dt.getMonth()+1)+pad(dt.getDate())+"T"+pad(dt.getHours())+pad(dt.getMinutes())+"00"; };
  const start = toGCal(ev.date, ev.time);
  const end   = ev.endtime ? toGCal(ev.date, ev.endtime) : toGCal(ev.date, ev.time);
  const loc   = ev.location || ev.meetinglink || "";
  const url   = "https://calendar.google.com/calendar/render?action=TEMPLATE" +
    "&text=" + encodeURIComponent(ev.title) +
    "&dates=" + start + "/" + end +
    "&details=" + encodeURIComponent((ev.description||"").slice(0,500)) +
    "&location=" + encodeURIComponent(loc);
  window.open(url, "_blank");
}

function share() {
  const url = window.location.href;
  if (navigator.share) { navigator.share({ title: document.title, url }).catch(()=>{}); }
  else { navigator.clipboard.writeText(url).then(()=>alert("Link copied!")).catch(()=>prompt("Copy this link:",url)); }
}

function showError(msg) {
  document.getElementById("card").innerHTML = `<div class="error">${esc(msg)}</div>`;
}

async function init() {
  const id = new URLSearchParams(window.location.search).get("id");
  if (!id) { showError("No event specified."); return; }
  // Check recurring events (IDs are dynamic: recurring-{slug}-{YYYY-MM-DD})
  if (id.startsWith("recurring-")) {
    const dateStr = id.slice(-10); // last 10 chars = YYYY-MM-DD
    const slug    = id.slice("recurring-".length, id.length - 11); // between prefix and date
    // Match using same slug logic as events.html: title.toLowerCase().replace(/\s+/g,"-")
    const recurMatch = RECURRING_EVENTS.find(r =>
      r.title.toLowerCase().replace(/\s+/g, "-") === slug
    );
    if (recurMatch) {
      const ev = recurToEv(recurMatch);
      ev.date = dateStr;
      render(ev);
      return;
    }
  }

  try {
    const data = await jsonp({ t: Date.now() });
    const ev = (data.events||[]).filter(r=>r.id).map(toEv).find(e=>e.id===id);
    if (!ev) { showError("Event not found."); return; }
    render(ev);
  } catch(e) {
    showError("Could not load event. Please try again.");
  }
}

init();
</script>
