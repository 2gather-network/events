<!DOCTYPE html>
<html lang="en">
<head>
  <!--
  event.html Version 4.48
  v4.48 - linkify creating.works in event description
  v4.47 - Associated group link below venue; Appear ID field in interest form
  -->
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event</title>
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/2Gather-Network/events/main/images/2gather_logo.png">
  <meta name="description" id="meta-description" content="">
  <meta property="og:title" id="og-title" content="">
  <meta property="og:description" id="og-description" content="">
  <meta property="og:image" id="og-image" content="">
  <meta property="og:type" content="event">
  <meta property="og:url" id="og-url" content="">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" id="x-title" content="">
  <meta name="twitter:description" id="x-description" content="">
  <meta name="twitter:image" id="x-image" content="">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1b6896;
      --dark: #1a1a2e;
      --muted: #6b7280;
      --border: #e5e7eb;
      --bg: #f5f6fa;
      --card-bg: #ffffff;
      --radius: 14px;
    }
    body {
      font-family: 'Nunito Sans','Segoe UI',sans-serif;
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 24px 16px 64px;
    }
    @supports (-webkit-touch-callout: none) {
      body { padding-bottom: 160px; }
    }
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      width: 100%;
      max-width: 560px;
      overflow: hidden;
    }
    .cover-img { width: 100%; height: 220px; object-fit: cover; display: block; }
    .card-body { padding: 24px 24px 28px; touch-action: pan-y; }
    .top-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .format-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 600; padding: 4px 10px;
      border-radius: 20px; letter-spacing: 0.03em; white-space: nowrap;
    }
    .badge-virtual  { background: #EFF6FF; color: #1d4ed8; }
    .badge-inperson { background: #F0FDF4; color: #166534; }
    .badge-hybrid   { background: #FFF7ED; color: #9a3412; }
    .badge-recurring { background: #E8F2F9; color: var(--primary); }
    h1 { font-size: 22px; font-weight: 700; line-height: 1.3; margin-bottom: 18px; }
    .meta { display: flex; flex-direction: column; gap: 9px; margin-bottom: 18px; }
    .meta-item { display: flex; align-items: flex-start; gap: 8px; font-size: 14px; line-height: 1.5; }
    .meta-item span { flex-shrink: 0; }
    .meta-item a { color: var(--primary); text-decoration: none; font-weight: 600; }
    .contributions {
      font-size: 13px; color: var(--muted);
      margin-bottom: 18px; padding: 10px 14px;
      background: #f9fafb; border-radius: 8px; border: 1px solid var(--border);
    }
    .detail-img { width: 100%; border-radius: 10px; margin-bottom: 16px; display: block; max-height: 300px; object-fit: cover; }
    .description { font-size: 15px; color: #374151; line-height: 1.7; margin-bottom: 24px; white-space: pre-wrap; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; pointer-events:none; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; border: 1.5px solid transparent; text-decoration: none; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn-outline { background: transparent; border-color: var(--border); color: var(--dark); }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--muted); text-decoration: none; padding: 0 0 12px 0;
    }
    .back-link:hover { color: var(--primary); }
    .past-banner {
      background: #f0f0f0; color: #666; font-size: 11px; font-weight: 700;
      letter-spacing: 0.07em; padding: 5px 18px; border-bottom: 1px solid var(--border);
    }
    .loading, .error { text-align: center; padding: 60px 24px; color: var(--muted); font-size: 15px; }
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:100; align-items:center; justify-content:center; padding:20px; }
    .modal-overlay.open { display:flex; }
    .modal { background:#fff; border-radius:16px; padding:28px; max-width:400px; width:100%; max-height:92vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.2); }
    .modal-title { font-size:18px; font-weight:700; margin-bottom:18px; color:var(--dark); }
    .modal-field { margin-bottom:14px; }
    .modal-label { display:block; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin-bottom:6px; }
    .modal-input { width:100%; border:1.5px solid var(--border); border-radius:8px; padding:10px 14px; font-size:15px; font-family:inherit; color:var(--dark); outline:none; }
    .modal-input:focus { border-color:var(--primary); }
    .modal-actions { display:flex; gap:10px; margin-top:6px; }
    .error-msg { color:#c0392b; font-size:13px; margin-bottom:10px; display:none; }
    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--dark); color:white; padding:12px 24px; border-radius:10px; font-weight:700; font-size:14px; transition:transform .3s; z-index:200; white-space:nowrap; }
    .toast.show { transform:translateX(-50%) translateY(0); }
    @media(max-width:768px) {
      .modal-overlay { align-items:flex-end; justify-content:stretch; padding:0; }
      .modal { border-radius:20px 20px 0 0; max-width:100%; max-height:90vh; padding:8px 20px 32px; }
      .modal::before { content:""; display:block; width:40px; height:4px; background:var(--border); border-radius:2px; margin:8px auto 20px; }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div style="width:100%;max-width:560px;">
  <a class="back-link" href="https://gather.2gather.network/">← All events</a>
</div>
<div class="card" id="card">
  <div class="loading"><div style="width:32px;height:32px;border:3px solid #e5e7eb;border-top-color:#1b6896;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;"></div>Loading event...</div>
</div>
<div class="modal-overlay" id="interest-modal">
  <div class="modal">
    <div class="modal-title">I'm interested</div>
    <div class="modal-field">
      <label class="modal-label" id="int-name-label">Name</label>
      <input class="modal-input" id="int-name" type="text" placeholder="Your name" autocomplete="name">
    </div>
    <div class="modal-field">
      <label class="modal-label" id="int-email-label">Email</label>
      <input class="modal-input" id="int-email" type="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <p class="error-msg" id="int-error"></p>
    <div class="modal-actions">
      <button class="btn btn-primary" style="flex:1;" onclick="submitInterest()">Submit</button>
      <button class="btn btn-outline" onclick="closeInterestModal()">Cancel</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="edit-pin-modal">
  <div class="modal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div class="modal-title" style="margin-bottom:0;">✏️ Edit this event</div>
      <button onclick="closeEditPin()" style="background:none;border:none;font-size:20px;color:var(--muted);cursor:pointer;padding:4px;">×</button>
    </div>
    <p style="font-size:14px;color:var(--muted);margin-bottom:16px;">Enter the 4-digit PIN you set when posting this event.</p>
    <input class="modal-input" id="edit-pin-input" type="tel" maxlength="4" placeholder="••••" style="letter-spacing:0.3em;text-align:center;font-size:20px;margin-bottom:8px;" autocomplete="off" inputmode="numeric" pattern="[0-9]*">
    <p class="error-msg" id="edit-pin-error" style="margin-bottom:12px;">Incorrect PIN. Please try again.</p>
    <div class="modal-actions">
      <button class="btn btn-primary" style="flex:1;" onclick="submitEditPin()">Unlock</button>
      <button class="btn btn-outline" onclick="closeEditPin()">Cancel</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="read-notes-modal">
  <div class="modal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div class="modal-title" style="margin-bottom:0;">📝 Shared notes</div>
      <button onclick="closeReadNotes()" style="background:none;border:none;font-size:20px;color:var(--muted);cursor:pointer;padding:4px;">×</button>
    </div>
    <div id="read-notes-content" style="font-size:14px;color:var(--dark);line-height:1.7;white-space:pre-wrap;max-height:60vh;overflow-y:auto;"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>

const ROOMS = {
  "The Commons":            "https://events.2gather.network/events/yvrgej/zkxbzq",
  "Ikigai room":            "https://events.2gather.network/events/eojvkq/qwmpgq",
  "Wellness room":          "https://events.2gather.network/events/336936/504368",
  "Community Care room":    "https://events.2gather.network/events/yvrgej/gypxbp",
  "Co-Create room":         "https://events.2gather.network/events/yvrgej/rwbplq",
  "Coworking room":         "https://events.2gather.network/events/yvrgej/gpbqox",
  "Conference room":        "https://events.2gather.network/events/335887/502618",
};

const ROOM_EMOJI = {
  "The Commons": "🌳", "Ikigai room": "🧭", "Wellness room": "💛",
  "Community Care room": "💜", "Co-Create room": "🎨", "Coworking room": "💻",
  "Abundance room": "🌻", "Conference room": "🎤",
};

let RECURRING_EVENTS = [];

function getNextDate(dayOfWeek) {
  const now = new Date();
  const d = new Date(now);
  d.setHours(0,0,0,0);
  const diff = (dayOfWeek - d.getDay() + 7) % 7 || 7;
  d.setDate(d.getDate() + diff);
  return d.toISOString().slice(0,10);
}

function parseSheetTime(val) {
  if (!val) return "";
  const s = String(val);
  if (/^\d{2}:\d{2}$/.test(s)) return s;
  if (s.includes("T")) { const t = s.split("T")[1]; return t.substring(0, 5); }
  return s;
}

function recurToEv(r) {
  return {
    id: r.id, title: r.title||"",
    date: getNextDate(r.dayOfWeek),
    time: r.time||"", endtime: r.endtime||"",
    format: r.format||"", location: r.location||"",
    room: r.room||"", description: r.description||"",
    host: r.host||"", hostlink: r.hostlink||"",
    contactEmail: r.contactEmail||"", contactPhone: r.contactPhone||"",
    cooplink: r.cooplink||"", paymentlink: r.paymentlink||"",
    meetinglink: ROOMS[r.room] || "", showLinks: r.showLinks||"",
    otherExchange: r.otherExchange||"", exchangeType: r.exchangeType||"",
    recurFreq: r.recurFreq||"weekly", experience: r.experience||"",
    imageUrl: r.imageUrl||"", detailImageUrl: r.detailImageUrl||"", lifeStage: r.lifeStage||"", keywords: r.keywords||"", venue: r.venue||"",
    interestedEnabled: r.interestedEnabled||"off", interested: r.interested||"",
    sharedNotesEnabled: r.sharedNotesEnabled||false, sharedNotes: r.sharedNotes||"",
    host_note: r.host_note||"",
    cancelled: r.cancelled||false,
  };
}

const GS_URL = "https://script.google.com/macros/s/AKfycbzEavMnG4tMeWemoT5FLu9f_zjlKVIJsZLueG4nhw9akK0_nZqpbkZiXrAlWu1Fyhq9/exec";

function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function jsonp(params) {
  return new Promise((resolve, reject) => {
    const cb = "cb_" + Date.now() + "_" + Math.random().toString(36).slice(2);
    let done = false;
    const finish = (fn) => { if (done) return; done = true; delete window[cb]; try { el.remove(); } catch(e){} fn(); };
    const t = setTimeout(() => finish(() => reject(new Error("timeout"))), 20000);
    window[cb] = (d) => { clearTimeout(t); finish(() => resolve(d)); };
    const qs = Object.entries(params).map(([k,v]) => encodeURIComponent(k)+"="+encodeURIComponent(v)).join("&");
    const el = document.createElement("script");
    el.src = GS_URL + "?" + qs + "&callback=" + cb;
    el.onerror = () => finish(() => reject(new Error("error")));
    document.head.appendChild(el);
  });
}

function parseDate(v) {
  if (!v) return "";
  const s = String(v).trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  if (s.includes("T")) return s.split("T")[0];
  const m = s.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m) return m[3]+"-"+m[1].padStart(2,"0")+"-"+m[2].padStart(2,"0");
  return s;
}

function parseTime(v) {
  if (!v) return "";
  const m = String(v).trim().match(/(\d{1,2}):(\d{2})\s*(AM|PM)?/i);
  if (!m) return "";
  let h = parseInt(m[1]); const mn = m[2], ap = (m[3]||"").toUpperCase();
  if (ap==="PM" && h<12) h+=12;
  if (ap==="AM" && h===12) h=0;
  return String(h).padStart(2,"0")+":"+mn;
}

function fmtDate(date, time, endtime) {
  if (!date) return "";
  const d = new Date(date+"T"+(time||"00:00"));
  let s = d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
  if (time) {
    s += " · " + new Date(date+"T"+time).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
    if (endtime) s += " - " + new Date(date+"T"+endtime).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
    try { const tzAbbr = new Date(date+"T"+time).toLocaleTimeString("en-US",{timeZoneName:"short"}).split(" ").pop(); s += " " + tzAbbr; } catch(e){}
  }
  return s;
}

function toEv(r) {
  return {
    id: String(r.id||""), title: r.title||"",
    date: parseDate(r.date), time: parseTime(r.startTime), endtime: parseTime(r.endTime),
    format: r.format||"", location: r.location||"", room: r.room||"",
    description: r.description||"", host: r.host||"", hostlink: r.hostlink||"",
    contactEmail: r.contactEmail||"", contactPhone: r.contactPhone||"",
    cooplink: r.cooplink||"", paymentlink: r.paymentlink||"", meetinglink: r.meetinglink||"",
    showLinks: r.showLinks||"", otherExchange: r.otherExchange||"",
    exchangeType: r.exchangeType||"", recurFreq: r.recurFreq||"",
    experience: r.experience||"", imageUrl: r.imageUrl||"", detailImageUrl: r.detailImageUrl||"", lifeStage: r.lifeStage||"", keywords: r.keywords||"", venue: r.venue||"",
    interestedEnabled: r.interestedEnabled||"off", interested: r.interested||"",
    sharedNotesEnabled: r.sharedNotesEnabled==="true"||r.sharedNotesEnabled===true||false, sharedNotes: r.sharedNotes||"",
    passcode: r.passcode||"",
    host_note: r.host_note||"",
    cancelled: r.cancelled==="true"||r.cancelled===true||false,
    categories: (r.categories||"").split(",").map(s=>s.trim()).filter(Boolean),
    venue: r.venue||"",
  };
}

function render(ev) {
  const today = new Date(); today.setHours(0,0,0,0);
  const eventDay = ev.date ? new Date(ev.date + "T00:00:00") : null;
  const isPast = eventDay && eventDay < today;

  const expMap = {connected:"🌐 Connected",expressed:"🎨 Expressed",nourished:"🥘 Nourished from food/drink",energized:"🌀 Energized",playful:"🏓 Playful",rested:"💙 Rested"};
  const catMap = {arts:"Arts/culture",movement:"Physical health/wellness",learning:"Learning/discovery",nature:"Nature/outdoors",professional:"Work/skills",creative:"Creative making",faith:"Inner life",resources:"Resource sharing",care:"Mental health/wellness",social:"Social gathering",family:"Family/caregiving/home",food:"Food/drink",wealth:"Wealth/abundance"};
  const typeMap = {spread:"📣 Spread the word",time:"⏰ Time",connections:"🌐 Referrals/Connections",feedback:"💬 Feedback",food:"🥘 Food/drink",skills:"🛠️ Skills",stuff:"🎁 Stuff",space:"📍 Space",money:"💵 Money",care:"💛 Care",noask:"🤝 No ask",free:"🎁 Free",testimonial:"⭐ Testimonial",share:"🔗 Share"};

  const fmtBadge = ev.format==="virtual" ? `<span class="format-badge badge-virtual">💻 Virtual</span>`
    : ev.format==="inperson" ? `<span class="format-badge badge-inperson">📍 In-person</span>`
    : ev.format==="both" ? `<span class="format-badge badge-hybrid">🔀 Hybrid</span>` : "";

  const recurBadge = ev.recurFreq ? `<span class="format-badge badge-recurring">🔁 ${ev.recurFreq==="monthly"?"Monthly":"Weekly"}</span>` : "";

  const roomUrl = ROOMS[ev.room] || "https://events.2gather.network/events/yvrgej/zkxbzq";
  const roomEmoji = ROOM_EMOJI[ev.room] || "🏠";
  const isToday = eventDay && eventDay.toDateString() === today.toDateString();
  const joinBtn = (ev.format === "virtual" || ev.format === "both") && isToday
    ? `<a href="${esc(ev.meetinglink || roomUrl)}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;background:var(--primary);color:#fff;padding:8px 18px;border-radius:20px;font-weight:700;font-size:13px;text-decoration:none;white-space:nowrap;flex-shrink:0;">Join virtual meeting</a>`
    : "";
  const meetingRoomLine = (ev.format === "virtual" || ev.format === "both") && ev.room
    ? `<div class="meta-item"><span>${roomEmoji}</span><span>Meeting room: <a href="${esc(roomUrl)}" target="_blank" rel="noopener" style="color:var(--primary);">${esc(ev.room)}</a></span></div>`
    : "";

  const locLink = ev.location
    ? `<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(ev.location)}" target="_blank" rel="noopener">${esc(ev.location)}</a>`
    : "In-person";

  const hostHtml = ev.hostlink ? `<a href="${esc(ev.hostlink)}" target="_blank" rel="noopener">${esc(ev.host)}</a>` : esc(ev.host);
  const firstName = (ev.host||"").trim().split(/\s+/)[0]||"Host";

  const sl = ev.showLinks||"";
  const lines = [
    ev.date ? `<div class="meta-item"><span>🗓️</span><span>${esc(fmtDate(ev.date,ev.time,ev.endtime))}</span></div>` : "",
    (fmtBadge||recurBadge) ? `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;">${fmtBadge}${recurBadge}</div>` : "",
    ev.experience ? `<div class="meta-item"><span>✨</span><div style="display:flex;flex-wrap:wrap;gap:5px;align-items:center;"><strong>Experience:</strong>${ev.experience.split(",").filter(Boolean).map(t=>`<span style="font-size:12px;padding:3px 9px;background:#f3f4f6;border-radius:20px;white-space:nowrap;">${expMap[t]||t}</span>`).join("")}</div></div>` : "",
    (ev.categories && ev.categories.length) ? `<div class="meta-item" style="margin-top:2px;align-items:flex-start;"><span>🏷️</span><span style="font-size:13px;color:var(--muted);white-space:normal;word-break:break-word;flex:1;">${ev.categories.map(c=>catMap[c]||c).join(", ")}</span></div>` : "",
    meetingRoomLine,
    (ev.format==="inperson"||ev.format==="both") ? `<div class="meta-item"><span>📍</span>${locLink}</div>` : "",
    (!ev.format&&ev.location) ? `<div class="meta-item"><span>📍</span>${locLink}</div>` : "",
    ev.venue ? `<div class="meta-item"><span>🏛️</span><span style="font-size:14px;"><strong>Venue:</strong> <a href="events.html?venue=${encodeURIComponent(ev.venue)}" style="color:var(--primary);text-decoration:none;">${esc(ev.venue)}</a></span></div>` : "",
    ev.cooplink ? `<div class="meta-item"><span>🔗</span><span style="font-size:14px;"><a href="${esc(ev.cooplink)}" target="_blank" rel="noopener" style="color:var(--primary);text-decoration:none;">Associated group</a></span></div>` : "",
    ev.host ? `<div class="meta-item"><span>👤</span><span style="font-size:14px;"><strong>Event host:</strong> ${hostHtml}</span></div>` : "",
    (ev.paymentlink&&sl.includes("paymentlink")) ? `<div class="meta-item"><span>💳</span><a href="${esc(ev.paymentlink)}" target="_blank" rel="noopener">Register / Pay</a></div>` : "",

    (ev.contactEmail&&sl.includes("contact")) ? `<div class="meta-item"><span>✉️</span><a href="mailto:${esc(ev.contactEmail)}">${esc(ev.contactEmail)}</a></div>` : "",
    (ev.contactPhone&&sl.includes("contact")) ? `<div class="meta-item"><span>📞</span><span>${esc(ev.contactPhone)}</span></div>` : "",
  ].filter(Boolean).join("");

  const exchange = ev.exchangeType
    ? `<div style="margin-bottom:18px;">
        <p style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin:0 0 8px;">What ${esc(firstName)} invites</p>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">${ev.exchangeType.split(",").filter(Boolean).map(t=>`<span style="font-size:13px;font-weight:600;padding:5px 12px;border-radius:20px;background:#f9fafb;border:1px solid var(--border);color:var(--dark);">${typeMap[t]||(t==="other"?"✏️ "+(ev.otherExchange||"Other"):t)}</span>`).join("")}</div>
       </div>` : "";

  const hasInterest = ev.interestedEnabled && ev.interestedEnabled !== "off";
  const hasNotes = ev.sharedNotesEnabled;
  const contactDisplay = (ev.contactEmail && sl.includes("contact")) ? ev.contactEmail
    : (ev.contactPhone && sl.includes("contact")) ? ev.contactPhone : "";
  const contactLink = contactDisplay
    ? `<a href="${contactDisplay.includes("@") ? "mailto:" : "tel:"}${esc(contactDisplay)}" style="color:var(--primary);font-weight:600;">${esc(contactDisplay)}</a>`

function addToCalendarById(id) {
  if (_currentEv && _currentEv.id === id) addToCalendar(_currentEv);
}

function addToCalendar(ev) {
  if (!ev.date) return;
  const pad = n => String(n).padStart(2,"0");
  const toGCal = (d,t) => { const dt = new Date(d+"T"+(t||"00:00")); return dt.getFullYear()+pad(dt.getMonth()+1)+pad(dt.getDate())+"T"+pad(dt.getHours())+pad(dt.getMinutes())+"00"; };
  const start = toGCal(ev.date, ev.time);
  const end   = ev.endtime ? toGCal(ev.date, ev.endtime) : toGCal(ev.date, ev.time);
  const loc   = ev.location || ev.meetinglink || "";
  const params = new URLSearchParams({
    text: ev.title,
    dates: start + "/" + end,
    details: (ev.description||"").slice(0,500),
    location: loc,
  });
  if (ev.recurFreq === "weekly") {
    const day = ["SU","MO","TU","WE","TH","FR","SA"][new Date(ev.date+"T12:00").getDay()];
    params.append("recur", "RRULE:FREQ=WEEKLY;BYDAY="+day);
  } else if (ev.recurFreq === "monthly") {
    params.append("recur", "RRULE:FREQ=MONTHLY");
  }
  window.open("https://calendar.google.com/calendar/r/eventedit?" + params.toString(), "_blank");
}

async function copyLink() {
  const btn = document.getElementById("copy-btn");
  const origText = btn ? btn.innerHTML : "";
  if (btn) btn.innerHTML = "⏳ Getting link...";

  try {
    const id = _currentEv && _currentEv.id;
    if (!id) throw new Error("no id");
    const res = await fetch(`${GS_URL}?action=getShortCode&id=${encodeURIComponent(id)}`);
    const data = await res.json();
    if (data.status !== "ok" || !data.code) throw new Error("no code");
    const shortUrl = `https://go.2gather.network/${data.code}`;
    await navigator.clipboard.writeText(shortUrl);
    if (btn) { btn.innerHTML = "✓ Copied!"; setTimeout(() => btn.innerHTML = origText, 2000); }
  } catch(e) {
    if (btn) btn.innerHTML = origText;
    const fallbackUrl = window.location.href;
    navigator.clipboard?.writeText(fallbackUrl).then(() => showToast("🔗 Link copied!")).catch(() => prompt("Copy this link:", fallbackUrl));
  }
}

function share() {
  const url = window.location.href;

  const showCopyUI = () => {
    const existing = document.getElementById("share-url-box");
    if (existing) { existing.remove(); return; }
    const box = document.createElement("div");
    box.id = "share-url-box";
    box.style.cssText = "position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:14px 16px;box-shadow:0 4px 24px rgba(0,0,0,.18);z-index:9999;width:min(340px,92vw);";
    box.innerHTML = `<p style="font-size:12px;color:var(--muted);margin:0 0 8px;">Copy this link to share:</p><div style="display:flex;gap:8px;"><input id="share-url-input" value="${url}" readonly style="flex:1;border:1.5px solid var(--border);border-radius:6px;padding:7px 10px;font-size:12px;color:var(--dark);min-width:0;"><button id="share-copy-btn" onclick="(()=>{const i=document.getElementById('share-url-input');i.select();navigator.clipboard?.writeText(i.value).catch(()=>{});document.getElementById('share-copy-btn').textContent='✓';setTimeout(()=>document.getElementById('share-url-box')?.remove(),1200);})()" style="background:var(--primary);color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0;">Copy</button></div>`;
    document.body.appendChild(box);
    setTimeout(() => { const i = document.getElementById("share-url-input"); i?.select(); }, 60);
    setTimeout(() => box.remove(), 8000);
  };

  const copyFallback = () => {
    navigator.clipboard?.writeText(url)
      .then(() => showToast("🔗 Link copied!"))
      .catch(() => showCopyUI());
  };

  if (navigator.share) {
    navigator.share({ title: document.title, url })
      .catch(err => { if (err.name !== "AbortError") copyFallback(); });
  } else {
    copyFallback();
  }
}

  const modeLabel = _attendanceMode === "online" ? "💻 Online" : _attendanceMode === "inperson" ? "📍 In-person" : "";
  const entry = [name, appearId ? `@${appearId}` : "", modeLabel].filter(Boolean).join(" · ") || "Anonymous";

  // If this is a recurring event, auto-create a sheet row first so interest saves correctly
  if (_currentEv.id && _currentEv.id.startsWith("recurring-")) {
    const stableId = "rec-" + (_currentEv.title||"").toLowerCase().replace(/\s+/g,"-").replace(/[^a-z0-9-]/g,"");

        action: "add",

async function init() {
  const inIframe = window.self !== window.top;
  // hide back link when in iframe - the modal provides navigation
  if (inIframe) {
    const backBar = document.querySelector('body > div:first-child');
    if (backBar) backBar.style.display = "none";
  }
  const id = new URLSearchParams(window.location.search).get("id");
  if (!id) { render(PREVIEW_EVENT); return; }

  // If a template row ID (rec-) is passed, resolve to next occurrence in-place
  if (id.startsWith("rec-")) {
    try {
      const sheetData = await jsonp({ t: Date.now() });
      const allRows = (sheetData.events || []).filter(r => r.id);
      const tmpl = allRows.find(r => String(r.id) === id);
      if (tmpl && tmpl.dayOfWeek) {
        const slug = (tmpl.title || "").toLowerCase().replace(/\s+/g, "-");
        const nextDate = getNextDate(parseInt(tmpl.dayOfWeek));
        const occId = `recurring-${slug}-${nextDate}`;
        const recEv = { ...toEv(tmpl), dayOfWeek: parseInt(tmpl.dayOfWeek) || 0, time: parseSheetTime(tmpl.startTime), endtime: parseSheetTime(tmpl.endTime), id: occId };
        const ev = recurToEv(recEv);
        ev.id = occId;
        ev.date = nextDate;
        const noteRow = allRows.map(toEv).find(e => e.id === "occ-note-" + occId);
        if (noteRow) {
          const _today = new Date(); _today.setHours(0,0,0,0);
          if (new Date(nextDate + "T00:00:00") >= _today) ev.occurrenceNote = noteRow.description;
        }
        render(ev);
        return;
      }
    } catch(e) {}
    showError("Event not found.");
    return;
  }
  // Check recurring events (IDs are dynamic: recurring-{slug}-{YYYY-MM-DD})
  if (id.startsWith("recurring-")) {
    const dateStr = id.slice(-10);
    const slug    = id.slice("recurring-".length, id.length - 11);
    try {
      const sheetData = await jsonp({ t: Date.now() });
      const allRows = (sheetData.events || []).filter(r => r.id);
      // Build RECURRING_EVENTS from rec- rows in sheet
      RECURRING_EVENTS = allRows
        .filter(r => String(r.id).startsWith("rec-") && r.recurFreq && r.dayOfWeek)
        .map(r => ({ ...toEv(r), dayOfWeek: parseInt(r.dayOfWeek) || 0, time: parseSheetTime(r.startTime), endtime: parseSheetTime(r.endTime) }));
      const recurMatch = RECURRING_EVENTS.find(r =>
        r.title.toLowerCase().replace(/\s+/g, "-") === slug
      );
      if (recurMatch) {
        const ev = recurToEv(recurMatch);
        ev.id = id;
        ev.date = dateStr;
        const noteRow = allRows.map(toEv).find(e => e.id === "occ-note-" + id);
        if (noteRow && dateStr) {
          const _today = new Date(); _today.setHours(0,0,0,0);
          if (new Date(dateStr + "T00:00:00") >= _today) ev.occurrenceNote = noteRow.description;
        }
        render(ev);
        return;
      }
    } catch(e) {
      showError("Could not load event. Please try again.");
      return;
    }
  }

  try {
    const data = await jsonp({ t: Date.now() });
    const ev = (data.events||[]).filter(r=>r.id).map(toEv).find(e=>e.id===id);
    if (!ev) { showError("Event not found."); return; }
    render(ev);
  } catch(e) {
    showError("Could not load event. Please try again.");
  }
}
