<!DOCTYPE html>
<html lang="en">
<head>
  <!--
  event.html Version 2.9
  v2.9 - Optimistic interest submit; fix text; contact info moves to post-submit
  -->
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1b6896;
      --dark: #1a1a2e;
      --muted: #6b7280;
      --border: #e5e7eb;
      --bg: #f5f6fa;
      --card-bg: #ffffff;
      --radius: 14px;
    }
    body {
      font-family: 'Nunito Sans','Segoe UI',sans-serif;
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 24px 16px 64px;
    }
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      width: 100%;
      max-width: 560px;
      overflow: hidden;
    }
    .cover-img { width: 100%; height: 220px; object-fit: cover; display: block; }
    .card-body { padding: 24px 24px 28px; }
    .top-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .format-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 600; padding: 4px 10px;
      border-radius: 20px; letter-spacing: 0.03em; white-space: nowrap;
    }
    .badge-virtual  { background: #EFF6FF; color: #1d4ed8; }
    .badge-inperson { background: #F0FDF4; color: #166534; }
    .badge-hybrid   { background: #FFF7ED; color: #9a3412; }
    .badge-recurring { background: #E8F2F9; color: var(--primary); }
    h1 { font-size: 22px; font-weight: 700; line-height: 1.3; margin-bottom: 18px; }
    .meta { display: flex; flex-direction: column; gap: 9px; margin-bottom: 18px; }
    .meta-item { display: flex; align-items: flex-start; gap: 8px; font-size: 14px; line-height: 1.5; }
    .meta-item span { flex-shrink: 0; }
    .meta-item a { color: var(--primary); text-decoration: none; font-weight: 600; }
    .contributions {
      font-size: 13px; color: var(--muted);
      margin-bottom: 18px; padding: 10px 14px;
      background: #f9fafb; border-radius: 8px; border: 1px solid var(--border);
    }
    .detail-img { width: 100%; border-radius: 10px; margin-bottom: 16px; display: block; max-height: 300px; object-fit: cover; }
    .description { font-size: 15px; color: #374151; line-height: 1.7; margin-bottom: 24px; white-space: pre-wrap; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; border: 1.5px solid transparent; text-decoration: none; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn-outline { background: transparent; border-color: var(--border); color: var(--dark); }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--muted); text-decoration: none; padding: 0 0 12px 0;
    }
    .back-link:hover { color: var(--primary); }
    .past-banner {
      background: #f0f0f0; color: #666; font-size: 11px; font-weight: 700;
      letter-spacing: 0.07em; padding: 5px 18px; border-bottom: 1px solid var(--border);
    }
    .loading, .error { text-align: center; padding: 60px 24px; color: var(--muted); font-size: 15px; }
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:100; align-items:center; justify-content:center; padding:20px; }
    .modal-overlay.open { display:flex; }
    .modal { background:#fff; border-radius:16px; padding:28px; max-width:400px; width:100%; max-height:92vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.2); }
    .modal-title { font-size:18px; font-weight:700; margin-bottom:18px; color:var(--dark); }
    .modal-field { margin-bottom:14px; }
    .modal-label { display:block; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin-bottom:6px; }
    .modal-input { width:100%; border:1.5px solid var(--border); border-radius:8px; padding:10px 14px; font-size:15px; font-family:inherit; color:var(--dark); outline:none; }
    .modal-input:focus { border-color:var(--primary); }
    .modal-actions { display:flex; gap:10px; margin-top:6px; }
    .error-msg { color:#c0392b; font-size:13px; margin-bottom:10px; display:none; }
    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--dark); color:white; padding:12px 24px; border-radius:10px; font-weight:700; font-size:14px; transition:transform .3s; z-index:200; white-space:nowrap; }
    .toast.show { transform:translateX(-50%) translateY(0); }
    @media(max-width:768px) {
      .modal-overlay { align-items:flex-end; justify-content:stretch; padding:0; }
      .modal { border-radius:20px 20px 0 0; max-width:100%; max-height:90vh; padding:8px 20px 32px; }
      .modal::before { content:""; display:block; width:40px; height:4px; background:var(--border); border-radius:2px; margin:8px auto 20px; }
    }
  </style>
</head>
<body>
<div style="width:100%;max-width:560px;">
  <a class="back-link" href="calendar.html">← All events</a>
</div>
<div class="card" id="card">
  <div class="loading">Loading event...</div>
</div>
<div class="modal-overlay" id="interest-modal">
  <div class="modal">
    <div class="modal-title">I'm interested</div>
    <div class="modal-field">
      <label class="modal-label" id="int-name-label">Name</label>
      <input class="modal-input" id="int-name" type="text" placeholder="Your name" autocomplete="name">
    </div>
    <div class="modal-field">

    </div>
    <p class="error-msg" id="int-error"></p>
    <div class="modal-actions">

  </div>
</div>
<div class="modal-overlay" id="edit-pin-modal">
  <div class="modal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div class="modal-title" style="margin-bottom:0;">✏️ Edit this event</div>

    </div>
    <p style="font-size:14px;color:var(--muted);margin-bottom:16px;">Enter the 4-digit PIN you set when posting this event.</p>
    <input class="modal-input" id="edit-pin-input" type="password" maxlength="4" placeholder="••••" style="letter-spacing:0.3em;text-align:center;font-size:20px;margin-bottom:8px;" autocomplete="off">

    <div class="modal-actions">
      <button class="btn btn-primary" style="flex:1;" onclick="submitEditPin()">Unlock</button>
      <button class="btn btn-outline" onclick="closeEditPin()">Cancel</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="read-notes-modal">
  <div class="modal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div class="modal-title" style="margin-bottom:0;">📝 Shared notes</div>
      <button onclick="closeReadNotes()" style="background:none;border:none;font-size:20px;color:var(--muted);cursor:pointer;padding:4px;">×</button>
    </div>
    <div id="read-notes-content" style="font-size:14px;color:var(--dark);line-height:1.7;white-space:pre-wrap;max-height:60vh;overflow-y:auto;"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>

const ROOMS = {

const RECURRING_EVENTS = [
  { id:"onboarding-001", title:"DayBalancer Onboarding", dayOfWeek:1, time:"12:00", endtime:"13:00", format:"virtual", room:"DayBalancer Onboarding", host:"DayBalancer", hostlink:"", categories:["learning"], description:"New to DayBalancer? Join us every Monday for a live onboarding session. We'll walk you through the platform, answer your questions, and help you get connected to the community.", experience:"connected,energized", recurFreq:"weekly", interestedEnabled:"optional" },
  { id:"ikigai-001", title:"Ikigai Tuesdays", dayOfWeek:2, time:"12:00", endtime:"13:00", format:"virtual", room:"Ikigai room", host:"Jessie Upp", hostlink:"https://appear.network/dl/page/s/e13594/r/w.hssQR.Q7CnpNDnVJ6DwQ", categories:["learning"], description:"A weekly pause to reconnect with what matters. We explore together where your joy, your strengths, and what's needed in the world actually meet.", experience:"connected,expressed,rested", recurFreq:"weekly", interestedEnabled:"optional" },
  { id:"wellness-001", title:"Wellness Wednesdays", dayOfWeek:3, time:"12:00", endtime:"13:00", format:"virtual", room:"Wellness room", host:"Jessie Upp", hostlink:"https://appear.network/dl/page/s/e13594/r/w.hssQR.Q7CnpNDnVJ6DwQ", categories:["care"], description:"Come join our wellness room to discuss how you want to support wellness in your community. Weekly on Wednesdays.", experience:"rested,energized", imageUrl:"https://lh3.googleusercontent.com/d/1qQlQYosaLI47pV2scZD6K_boxYk9XV3C", recurFreq:"weekly", sharedNotesEnabled:true, interestedEnabled:"optional" },
  { id:"feedback-001", title:"Feedback Fridays", dayOfWeek:5, time:"10:30", endtime:"10:45", format:"virtual", room:"Co-Create room", host:"Jessie Upp", hostlink:"https://appear.network/dl/page/s/e13594/r/w.hssQR.Q7CnpNDnVJ6DwQ", categories:["learning"], description:"Bring an idea - small or big. Connect with others in the room and break into another room - or schedule time for later for feedback.", experience:"connected,expressed,energized", imageUrl:"https://lh3.googleusercontent.com/d/1Vs2GpvmFdSOrdLYs2hy8lO06SNyYxm_c", recurFreq:"weekly", interestedEnabled:"optional" },
  { id:"kickoff-001", title:"Kick off Mondays for Independents", dayOfWeek:1, time:"09:00", endtime:"12:00", format:"both", room:"The Commons", location:"23000 Lakeview Dr, Mountlake Terrace, WA 98043", host:"Jessie Upp", hostlink:"https://appear.network/dl/page/s/e13594/r/w.hssQR.Q7CnpNDnVJ6DwQ", contactEmail:"jessie@appear.network", categories:["arts","learning","professional","creative","resources","care","social","wealth"], description:"Creators create. Start your week with other independents. Share what you're working on, what you need, and what you're offering. Stay for open coworking. Login virtually or join in at this space if you're local, right off the light rail.", experience:"connected,expressed,energized", exchangeType:"spread,feedback", showLinks:"contact", imageUrl:"https://lh3.googleusercontent.com/d/1cNqWkDAo6RfZDetJ0bkAM9x0UWbHImNC", recurFreq:"weekly", sharedNotesEnabled:true, interestedEnabled:"optional" },
  { id:"getstarted-001", title:"Get started with Appear Network", dayOfWeek:1, time:"12:00", endtime:"12:30", format:"virtual", room:"The Commons", host:"Jessie Upp", hostlink:"https://appear.network/dl/page/s/e13594/r/w.hssQR.Q7CnpNDnVJ6DwQ", categories:["learning"], description:"Join us every Monday for a live Q&A session. We'll walk you through the platform and help you get connected to community.", experience:"connected,energized", imageUrl:"https://lh3.googleusercontent.com/d/1QdQ2gA3bTSsrfrIYjf2D7ZqUyHuXBjbM", recurFreq:"weekly", interestedEnabled:"optional" },
  { id:"shinelight-001", title:"Shine your light! ⭐️", dayOfWeek:2, time:"13:00", endtime:"15:00", format:"inperson", location:"23000 Lakeview Dr, Mountlake Terrace, WA 98043", host:"Jessie Upp", hostlink:"https://appear.network/dl/page/s/e13594/r/w.hssQR.Q7CnpNDnVJ6DwQ", contactEmail:"hello@daybalancer.com", contactPhone:"601-348-7751", categories:["learning"], description:"A weekly pause to reconnect with what matters. We explore your gifts, what brings you joy, and what's needed - for yourself and your community. Come join us right off the MLT light rail. Arrive early for $5 lunch at noon, or arrive at 1:00 for circle dialogue. Stay after for networking, ping pong, or a walk to the lake. Need to join virtually? Request to join us in the virtual DayBalancer Commons from 1:00-2:00 PM PST.", exchangeType:"free,feedback,noask,money", showLinks:"hostlink,paymentlink,contact", experience:"connected,expressed,nourished,playful", imageUrl:"https://lh3.googleusercontent.com/d/1oZbvH8JJktR8h5m--5tQkjiZUrHgOuQh", recurFreq:"weekly", interestedEnabled:"optional" },
];

function getNextDate(dayOfWeek) {
  const now = new Date();
  const d = new Date(now);
  d.setHours(0,0,0,0);
  const diff = (dayOfWeek - d.getDay() + 7) % 7 || 7;
  d.setDate(d.getDate() + diff);
  return d.toISOString().slice(0,10);
}

function recurToEv(r) {
  return {
    id: r.id, title: r.title||"",
    date: getNextDate(r.dayOfWeek),
    time: r.time||"", endtime: r.endtime||"",
    format: r.format||"", location: r.location||"",
    room: r.room||"", description: r.description||"",
    host: r.host||"", hostlink: r.hostlink||"",
    contactEmail: r.contactEmail||"", contactPhone: r.contactPhone||"",
    cooplink: r.cooplink||"", paymentlink: r.paymentlink||"",
    meetinglink: ROOMS[r.room] || "", showLinks: r.showLinks||"",
    otherExchange: r.otherExchange||"", exchangeType: r.exchangeType||"",
    recurFreq: r.recurFreq||"weekly", experience: r.experience||"",
    imageUrl: r.imageUrl||"", detailImageUrl: r.detailImageUrl||"", lifeStage: r.lifeStage||"", keywords: r.keywords||"",
    interestedEnabled: r.interestedEnabled||"off", interested: r.interested||"",
    sharedNotesEnabled: r.sharedNotesEnabled||false, sharedNotes: r.sharedNotes||"",
  };
}

const GS_URL = "https://script.google.com/macros/s/AKfycbzEavMnG4tMeWemoT5FLu9f_zjlKVIJsZLueG4nhw9akK0_nZqpbkZiXrAlWu1Fyhq9/exec";

function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function jsonp(params) {
  return new Promise((resolve, reject) => {
    const cb = "cb_" + Date.now() + "_" + Math.random().toString(36).slice(2);
    let done = false;
    const finish = (fn) => { if (done) return; done = true; delete window[cb]; try { el.remove(); } catch(e){} fn(); };
    const t = setTimeout(() => finish(() => reject(new Error("timeout"))), 20000);
    window[cb] = (d) => { clearTimeout(t); finish(() => resolve(d)); };
    const qs = Object.entries(params).map(([k,v]) => encodeURIComponent(k)+"="+encodeURIComponent(v)).join("&");
    const el = document.createElement("script");
    el.src = GS_URL + "?" + qs + "&callback=" + cb;
    el.onerror = () => finish(() => reject(new Error("error")));
    document.head.appendChild(el);
  });
}

function parseDate(v) {
  if (!v) return "";
  const s = String(v).trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  if (s.includes("T")) return s.split("T")[0];
  const m = s.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m) return m[3]+"-"+m[1].padStart(2,"0")+"-"+m[2].padStart(2,"0");
  return s;
}

function parseTime(v) {
  if (!v) return "";
  const m = String(v).trim().match(/(\d{1,2}):(\d{2})\s*(AM|PM)?/i);
  if (!m) return "";
  let h = parseInt(m[1]); const mn = m[2], ap = (m[3]||"").toUpperCase();
  if (ap==="PM" && h<12) h+=12;
  if (ap==="AM" && h===12) h=0;
  return String(h).padStart(2,"0")+":"+mn;
}

function fmtDate(date, time, endtime) {
  if (!date) return "";
  const d = new Date(date+"T"+(time||"00:00"));
  let s = d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
  if (time) {
    s += " · " + new Date(date+"T"+time).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
    if (endtime) s += " - " + new Date(date+"T"+endtime).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
    try { const tzAbbr = new Date(date+"T"+time).toLocaleTimeString("en-US",{timeZoneName:"short"}).split(" ").pop(); s += " " + tzAbbr; } catch(e){}
  }
  return s;
}

function toEv(r) {
  return {
    id: String(r.id||""), title: r.title||"",
    date: parseDate(r.date), time: parseTime(r.startTime), endtime: parseTime(r.endTime),
    format: r.format||"", location: r.location||"", room: r.room||"",
    description: r.description||"", host: r.host||"", hostlink: r.hostlink||"",
    contactEmail: r.contactEmail||"", contactPhone: r.contactPhone||"",
    cooplink: r.cooplink||"", paymentlink: r.paymentlink||"", meetinglink: r.meetinglink||"",
    showLinks: r.showLinks||"", otherExchange: r.otherExchange||"",
    exchangeType: r.exchangeType||"", recurFreq: r.recurFreq||"",
    experience: r.experience||"", imageUrl: r.imageUrl||"", detailImageUrl: r.detailImageUrl||"", lifeStage: r.lifeStage||"", keywords: r.keywords||"",
    interestedEnabled: r.interestedEnabled||"off", interested: r.interested||"",
    sharedNotesEnabled: r.sharedNotesEnabled==="true"||r.sharedNotesEnabled===true||false, sharedNotes: r.sharedNotes||"",
    passcode: r.passcode||"",
  };
}

function render(ev) {
  const isPast = ev.date && (ev.endtime
    ? new Date(ev.date+"T"+ev.endtime)<Date.now()
    : new Date(ev.date+"T"+(ev.time||"00:00")).getTime()+3600000<Date.now());

  const expMap = {connected:"🌐 Connected",expressed:"🎨 Expressed",nourished:"🥘 Nourished from food/drink",energized:"🌀 Energized",playful:"🏓 Playful",rested:"💙 Rested"};
  const typeMap = {spread:"📣 Spread the word",time:"⏰ Time",connections:"🌐 Referrals/Connections",feedback:"💬 Feedback",food:"🥘 Food/drink",skills:"🛠️ Skills",stuff:"🎁 Stuff",space:"📍 Space",money:"💵 Money",care:"💛 Care",noask:"📣 Spread the word",free:"💬 Feedback",testimonial:"⏰ Time",share:"💵 Money"};

  const fmtBadge = ev.format==="virtual" ? `<span class="format-badge badge-virtual">💻 Virtual</span>`
    : ev.format==="inperson" ? `<span class="format-badge badge-inperson">📍 In-person</span>`
    : ev.format==="both" ? `<span class="format-badge badge-hybrid">🔀 Hybrid</span>` : "";

  const recurBadge = ev.recurFreq ? `<span class="format-badge badge-recurring">🔁 ${ev.recurFreq==="monthly"?"Monthly":"Weekly"}</span>` : "";

  const roomUrl = ROOMS[ev.room] || "https://gather.daybalancer.com/events/yvrgej/zkxbzq";
  const vLink = ev.meetinglink ? `<a href="${esc(ev.meetinglink)}" target="_blank" rel="noopener">Join virtual meeting</a>`
    : ev.room ? `<a href="${esc(roomUrl)}" target="_blank" rel="noopener">${esc(ev.room)}</a>` : "Virtual";

  const locLink = ev.location
    ? `<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(ev.location)}" target="_blank" rel="noopener">${esc(ev.location)}</a>`
    : "In-person";

  const hostHtml = ev.hostlink ? `<a href="${esc(ev.hostlink)}" target="_blank" rel="noopener">${esc(ev.host)}</a>` : esc(ev.host);
  const firstName = (ev.host||"").trim().split(/\s+/)[0]||"Host";

  const sl = ev.showLinks||"";
  const lines = [
    ev.date ? `<div class="meta-item"><span>🗓️</span><span>${esc(fmtDate(ev.date,ev.time,ev.endtime))}</span></div>` : "",
    ev.experience ? `<div class="meta-item"><span>✨</span><span><strong>Experience:</strong> ${ev.experience.split(",").filter(Boolean).map(t=>expMap[t]||t).join(" · ")}</span></div>` : "",
    (ev.format==="virtual"||ev.format==="both") ? `<div class="meta-item"><span>💻</span>${vLink}</div>` : "",
    (ev.format==="inperson"||ev.format==="both") ? `<div class="meta-item"><span>📍</span>${locLink}</div>` : "",
    (!ev.format&&ev.location) ? `<div class="meta-item"><span>📍</span>${locLink}</div>` : "",
    ev.host ? `<div class="meta-item"><span>👤</span><span>Hosted by ${hostHtml}</span></div>` : "",
    (ev.paymentlink&&sl.includes("paymentlink")) ? `<div class="meta-item"><span>💳</span><a href="${esc(ev.paymentlink)}" target="_blank" rel="noopener">Register / Pay</a></div>` : "",
    (ev.cooplink&&sl.includes("cooplink")) ? `<div class="meta-item"><span>🔗</span><a href="${esc(ev.cooplink)}" target="_blank" rel="noopener">Group link</a></div>` : "",
    (ev.contactEmail&&sl.includes("contact")) ? `<div class="meta-item"><span>✉️</span><a href="mailto:${esc(ev.contactEmail)}">${esc(ev.contactEmail)}</a></div>` : "",
    (ev.contactPhone&&sl.includes("contact")) ? `<div class="meta-item"><span>📞</span><span>${esc(ev.contactPhone)}</span></div>` : "",
  ].filter(Boolean).join("");

  const exchange = ev.exchangeType
    ? `<div style="margin-bottom:18px;">
        <p style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin:0 0 8px;">What ${esc(firstName)} invites</p>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">${ev.exchangeType.split(",").filter(Boolean).map(t=>`<span style="font-size:13px;font-weight:600;padding:5px 12px;border-radius:20px;background:#f9fafb;border:1px solid var(--border);color:var(--dark);">${typeMap[t]||(t==="other"?"✏️ "+(ev.otherExchange||"Other"):t)}</span>`).join("")}</div>
       </div>` : "";

  const hasInterest = ev.interestedEnabled && ev.interestedEnabled !== "off";
  const hasNotes = ev.sharedNotesEnabled;
  const contactDisplay = (ev.contactEmail && sl.includes("contact")) ? ev.contactEmail
    : (ev.contactPhone && sl.includes("contact")) ? ev.contactPhone : "";
  const contactLink = contactDisplay
    ? `<a href="${contactDisplay.includes("@") ? "mailto:" : "tel:"}${esc(contactDisplay)}" style="color:var(--primary);font-weight:600;">${esc(contactDisplay)}</a>`
    : "the host directly";

  const engagementSection = (hasInterest || hasNotes) ? `
    <div id="engagement-section" style="margin:0 0 18px;">
      ${hasInterest ? `
        <div id="interest-area">
          <button class="btn btn-primary" onclick="showInterestForm()" id="interest-btn">+1 I'm interested</button>
        </div>
        <div id="interest-form" style="display:none;margin-top:14px;padding:18px;background:#f9fafb;border-radius:12px;border:1px solid var(--border);">
          <p style="font-size:14px;font-weight:700;color:var(--dark);margin-bottom:6px;">The host sees you expressed interest!</p>
          <p style="font-size:13px;color:var(--muted);margin-bottom:14px;">Want to share who is coming? Enter it below.</p>
          <input id="int-name-inline" style="width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;font-family:inherit;color:var(--dark);outline:none;margin-bottom:8px;" type="text" placeholder="Your name" autocomplete="name">
          <input id="int-email-inline" style="width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;font-family:inherit;color:var(--dark);outline:none;margin-bottom:10px;" type="email" placeholder="your@email.com" autocomplete="email">
          <p class="error-msg" id="int-inline-error"></p>
          <button class="btn btn-primary" onclick="submitInterestInline()" id="int-submit-btn">Submit</button>
        </div>
        <div id="interest-confirmed" style="display:none;margin-top:12px;font-size:13px;color:var(--muted);padding:10px 14px;background:#f0fdf4;border-radius:8px;border:1px solid #bbf7d0;">
          ✓ The host knows you're interested. If you can't make it, reach out to ${contactLink}.
        </div>
      ` : ""}
      ${hasNotes ? `
        <div id="notes-section" style="${hasInterest ? "display:none;" : ""}margin-top:${hasInterest ? "16" : "0"}px;">
          <p style="font-size:13px;color:var(--muted);margin-bottom:8px;">📋 This is a shared notes board - anything you add is seen by the host and all participants.</p>
          <textarea id="shared-notes-area" style="width:100%;min-height:110px;border:1.5px solid var(--border);border-radius:8px;padding:11px 14px;font-size:14px;font-family:inherit;resize:vertical;color:var(--dark);outline:none;">${esc(ev.sharedNotes||"")}</textarea>
          <div style="display:flex;align-items:center;gap:10px;margin-top:8px;">
            <button class="btn btn-outline" onclick="saveSharedNotes()" id="save-notes-btn" style="font-size:13px;padding:8px 16px;">Save</button>
            <span id="notes-saved-msg" style="display:none;font-size:13px;color:#4CAF7D;font-weight:700;">✓ Saved</span>
          </div>
        </div>
      ` : ""}
    </div>` : "";

  document.getElementById("card").innerHTML = `
    ${ev.imageUrl ? `<img class="cover-img" src="${esc(ev.imageUrl)}" alt="" onerror="this.style.display='none'">` : ""}
    ${isPast ? `<div class="past-banner">PAST EVENT</div>` : ""}
    <div class="card-body">
      <h1>${esc(ev.title)}</h1>
      <div class="meta">${lines}</div>
      ${exchange}
      ${ev.detailImageUrl ? `<img class="detail-img" src="${esc(ev.detailImageUrl)}" alt="" onerror="this.style.display='none'">` : ""}
      ${ev.description ? `<p class="description">${esc(ev.description)}</p>` : ""}
      ${engagementSection}
      <hr class="divider">
      <div class="actions">
        <button class="btn btn-primary" onclick="share()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px;"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg> Share</button>
        ${ev.date ? `<button class="btn btn-outline" onclick="addToCalendarById('${ev.id}')" style="gap:6px;">📅 Add to calendar</button>` : ""}
        <button class="btn btn-outline" onclick="copyLink()" id="copy-btn">🔗 Copy link</button>
        ${!ev.recurring ? `<button class="btn btn-outline" onclick="openEditPin()" title="Edit this event" style="padding:10px 14px;">✏️</button>` : ""}
      </div>
      ${(fmtBadge||recurBadge) ? `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;">${fmtBadge}${recurBadge}</div>` : ""}
    </div>`;

  document.title = ev.title || "Event";
  _currentEv = ev;

  // if already registered, show confirmed state
  if (ev.interestedEnabled && ev.interestedEnabled !== "off") {
    try {
      if (localStorage.getItem("db-interested-" + ev.id) === "1") {
        const btn = document.getElementById("interest-btn");
        if (btn) { btn.textContent = "✓ Interested"; btn.disabled = true; btn.style.opacity = "0.7"; }
        const confirmed = document.getElementById("interest-confirmed");
        if (confirmed) confirmed.style.display = "block";
        const notes = document.getElementById("notes-section");
        if (notes) notes.style.display = "block";
      }
    } catch(e) {}
  }
}


let _currentEv = null; // store rendered event for calendar lookup

function addToCalendarById(id) {
  if (_currentEv && _currentEv.id === id) addToCalendar(_currentEv);
}

function addToCalendar(ev) {
  if (!ev.date) return;
  const pad = n => String(n).padStart(2,"0");
  const toGCal = (d,t) => { const dt = new Date(d+"T"+(t||"00:00")); return dt.getFullYear()+pad(dt.getMonth()+1)+pad(dt.getDate())+"T"+pad(dt.getHours())+pad(dt.getMinutes())+"00"; };
  const start = toGCal(ev.date, ev.time);
  const end   = ev.endtime ? toGCal(ev.date, ev.endtime) : toGCal(ev.date, ev.time);
  const loc   = ev.location || ev.meetinglink || "";
  const params = new URLSearchParams({
    text: ev.title,
    dates: start + "/" + end,
    details: (ev.description||"").slice(0,500),
    location: loc,
  });
  if (ev.recurFreq === "weekly") {
    const day = ["SU","MO","TU","WE","TH","FR","SA"][new Date(ev.date+"T12:00").getDay()];
    params.append("recur", "RRULE:FREQ=WEEKLY;BYDAY="+day);
  } else if (ev.recurFreq === "monthly") {
    params.append("recur", "RRULE:FREQ=MONTHLY");
  }
  window.open("https://calendar.google.com/calendar/r/eventedit?" + params.toString(), "_blank");
}

function copyLink() {
  const url = window.location.href;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById("copy-btn");
    if (btn) { const orig = btn.textContent; btn.textContent = "✓ Copied!"; setTimeout(() => btn.textContent = orig, 2000); }
  }).catch(() => prompt("Copy this link:", url));
}

function share() {
  const url = window.location.href;
  if (navigator.share) { navigator.share({ title: document.title, url }).catch(()=>{}); }
  else { navigator.clipboard.writeText(url).then(()=>alert("Link copied!")).catch(()=>prompt("Copy this link:",url)); }
}

function showError(msg) {
  document.getElementById("card").innerHTML = `<div class="error">${esc(msg)}</div>`;
}

function showToast(msg) {
  const t = document.getElementById("toast");
  if (!t) return;
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

function showInterestForm() {
  const btn = document.getElementById("interest-btn");
  if (btn) { btn.textContent = "✓ Interested"; btn.disabled = true; btn.style.opacity = "0.7"; }
  const form = document.getElementById("interest-form");
  if (form) form.style.display = "block";
}

async function submitInterestInline() {
  if (!_currentEv) return;
  const name = (document.getElementById("int-name-inline")?.value || "").trim();
  const email = (document.getElementById("int-email-inline")?.value || "").trim();
  const required = _currentEv.interestedEnabled === "required";
  const errEl = document.getElementById("int-inline-error");
  if (required && (!name || !email)) {
    if (errEl) { errEl.textContent = "Please fill in both fields to register."; errEl.style.display = "block"; }
    return;
  }
  // optimistic UI - confirm immediately without waiting for API
  const form = document.getElementById("interest-form");
  if (form) form.style.display = "none";
  const confirmed = document.getElementById("interest-confirmed");
  if (confirmed) confirmed.style.display = "block";
  const notes = document.getElementById("notes-section");
  if (notes) notes.style.display = "block";
  const btn = document.getElementById("interest-btn");
  if (btn) { btn.textContent = "✓ Interested"; btn.disabled = true; btn.style.opacity = "0.7"; }
  try { localStorage.setItem("db-interested-" + _currentEv.id, "1"); } catch(e) {}
  // API call happens in background - user already sees confirmation
  const entry = [name, email].filter(Boolean).join(" · ") || "Anonymous";
  try { await jsonp({ action:"interest", id:_currentEv.id, entry }); } catch(e) { console.warn("Interest save failed", e); }
}

async function saveSharedNotes() {
  const area = document.getElementById("shared-notes-area");
  if (!area || !_currentEv) return;
  const notes = area.value;
  const btn = document.getElementById("save-notes-btn");
  if (btn) { btn.disabled = true; btn.textContent = "Saving..."; }
  try {
    await jsonp({ action:"sharedNotes", id:_currentEv.id, notes });
    _currentEv.sharedNotes = notes;
    const msg = document.getElementById("notes-saved-msg");
    if (msg) { msg.style.display = "inline"; setTimeout(() => msg.style.display = "none", 2500); }
  } catch(e) { console.warn("Notes save failed", e); showToast("Could not save. Try again."); }
  if (btn) { btn.disabled = false; btn.textContent = "Save"; }
}

const MASTER_PASSCODE = "6090";

function openEditPin() {
  if (!_currentEv) return;
  document.getElementById("edit-pin-input").value = "";
  document.getElementById("edit-pin-error").style.display = "none";
  document.getElementById("edit-pin-modal").classList.add("open");
  setTimeout(() => document.getElementById("edit-pin-input").focus(), 100);
}

function closeEditPin() {
  document.getElementById("edit-pin-modal").classList.remove("open");
}

function submitEditPin() {
  const pin = document.getElementById("edit-pin-input").value.trim();
  const ev = _currentEv;
  if (!ev) return;
  const errEl = document.getElementById("edit-pin-error");
  if (pin !== String(ev.passcode) && pin !== MASTER_PASSCODE) {
    errEl.style.display = "block";
    document.getElementById("edit-pin-input").value = "";
    document.getElementById("edit-pin-input").focus();
    return;
  }
  // store verified PIN so events.html can skip re-asking
  try { sessionStorage.setItem("ev-edit-verified-" + ev.id, pin); } catch(e) {}
  closeEditPin();
  // redirect to events.html with edit param
  const base = window.location.href.replace(/\/[^/]*(\?.*)?$/, "/");
  window.location.href = base + "events.html?edit=" + ev.id;
}

function openReadNotes() {
  if (!_currentEv || !_currentEv.sharedNotes) return;
  document.getElementById("read-notes-content").textContent = _currentEv.sharedNotes;
  document.getElementById("read-notes-modal").classList.add("open");
}
function closeReadNotes() {
  document.getElementById("read-notes-modal").classList.remove("open");
}

async function init() {
  const id = new URLSearchParams(window.location.search).get("id");
  if (!id) { render(PREVIEW_EVENT); return; }
  // Check recurring events (IDs are dynamic: recurring-{slug}-{YYYY-MM-DD})
  if (id.startsWith("recurring-")) {
    const dateStr = id.slice(-10); // last 10 chars = YYYY-MM-DD
    const slug    = id.slice("recurring-".length, id.length - 11); // between prefix and date
    // Match using same slug logic as events.html: title.toLowerCase().replace(/\s+/g,"-")
    const recurMatch = RECURRING_EVENTS.find(r =>
      r.title.toLowerCase().replace(/\s+/g, "-") === slug
    );
    if (recurMatch) {
      const ev = recurToEv(recurMatch);
      ev.date = dateStr;
      render(ev);
      return;
    }
  }

  try {
    const data = await jsonp({ t: Date.now() });
    const ev = (data.events||[]).filter(r=>r.id).map(toEv).find(e=>e.id===id);
    if (!ev) { showError("Event not found."); return; }
    render(ev);
  } catch(e) {
    showError("Could not load event. Please try again.");
  }
}
