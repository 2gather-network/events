<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DayBalancer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Verdana, Geneva, sans-serif; background: transparent; padding: 8px; }
  .widget { background: rgba(255,255,255,0.15); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); border-radius: 12px; padding: 10px; width: 160px; box-shadow: 0 4px 16px rgba(30,74,99,0.1); border: 1px solid rgba(255,255,255,0.3); }
  .header { display: flex; align-items: center; gap: 7px; margin-bottom: 8px; padding-bottom: 7px; border-bottom: 1px solid rgba(255,255,255,0.25); }
  .logo { width: 28px; height: 28px; border-radius: 6px; overflow: hidden; flex-shrink: 0; }
  .logo img { width: 100%; height: 100%; object-fit: cover; }
  .brand { font-size: 11px; font-weight: 700; color: #ffffff; line-height: 1.2; text-shadow: 0 1px 3px rgba(0,0,0,0.3); }
  .tagline { font-size: 7px; color: rgba(255,255,255,0.8); letter-spacing: 1px; text-transform: uppercase; }
  .buttons { display: flex; flex-direction: column; gap: 5px; }
  .btn { display: flex; align-items: center; gap: 7px; text-decoration: none; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.25); border-radius: 7px; padding: 6px 8px; transition: all 0.2s ease; }
  .btn:hover { background: rgba(255,255,255,0.4); border-color: rgba(255,255,255,0.5); }
  .emoji { font-size: 13px; flex-shrink: 0; }
  .btn-label { font-size: 11px; font-weight: 700; color: #ffffff; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
</style>
</head>
<body>
<div class="widget">
  <div class="header">
    <div class="logo"><img src="https://app.daybalancer.com/icon-192.png" alt="DayBalancer" onerror="this.style.display='none';this.parentElement.innerHTML='<svg viewBox=\'0 0 28 28\' fill=\'none\'><circle cx=\'14\' cy=\'14\' r=\'14\' fill=\'%231E4A63\'/><text x=\'14\' y=\'19\' text-anchor=\'middle\' font-size=\'14\' fill=\'white\' font-family=\'Verdana\'>D</text></svg>'"></div>
    <div><div class="brand">DayBalancer</div><div class="tagline">Events</div></div>
  </div>
  <div class="buttons">
    <a class="btn" href="https://app.daybalancer.com/dl/events" target="_blank">
      <span class="emoji">📅</span>
      <span class="btn-label">Events</span>
    </a>
    <a class="btn" href="https://app.daybalancer.com/dl/findatime" target="_blank">
      <span class="emoji">🕐</span>
      <span class="btn-label">Find a Time</span>
    </a>
  </div>
</div>
</body>
</html>
